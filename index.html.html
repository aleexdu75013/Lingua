<!DOCTYPE html>
<
  migrateCards();html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Lingua 2.0</title>
<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Bebas+Neue&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f0e8;
  --bg2: #ffffff;
  --bg3: #ede8df;
  --card: #ffffff;
  --border: #ddd5c8;
  --accent: #6c47ff;
  --accent2: #ff4d8d;
  --gold: #f59e0b;
  --green: #16a34a;
  --blue: #2563eb;
  --orange: #ea580c;
  --text: #1c1410;
  --muted: #7a6f65;
  --r: 18px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden;}
::-webkit-scrollbar{width:4px;}
::-webkit-scrollbar-track{background:var(--bg3);}
::-webkit-scrollbar-thumb{background:#c5b9ad;border-radius:4px;}

/* ── HEADER ── */
.hdr{position:fixed;top:0;left:0;right:0;z-index:200;background:rgba(245,240,232,0.97);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);height:60px;display:flex;align-items:center;padding:0 16px;gap:12px;}
.logo{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:2px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;flex-shrink:0;}
.hdr-stats{display:flex;gap:10px;align-items:center;margin-left:auto;}
.hdr-pill{display:flex;align-items:center;gap:5px;background:var(--bg3);border:1px solid var(--border);padding:5px 12px;border-radius:30px;font-size:0.8rem;font-weight:700;}
.hdr-pill span{font-size:1rem;}
.streak-fire{color:#ff6b35;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.15);}}
@keyframes spin{from{transform:rotate(0deg);}to{transform:rotate(360deg);}}
@keyframes slideUp{from{opacity:0;transform:translateX(-50%) translateY(20px);}to{opacity:1;transform:translateX(-50%) translateY(0);}}

/* ── MAIN LAYOUT ── */
.app{padding-top:60px;display:flex;height:100vh;}
/* ── SIDEBAR: LANGUE SELECTION ── */
.sidebar{width:140px;min-width:140px;display:flex;flex-direction:column;gap:0;padding:6px 5px 20px;border-right:1px solid var(--border);overflow-y:auto;overflow-x:hidden;scrollbar-width:none;background:var(--bg2);}
.sidebar-family{margin-bottom:8px;}
.sidebar-family-label{font-size:.6rem;font-weight:900;text-transform:uppercase;letter-spacing:.4px;padding:6px 6px 3px;opacity:.8;}
.sidebar::-webkit-scrollbar{display:none;}
.lang-side-btn{width:100%;min-height:48px;border-radius:12px;border:2px solid transparent;background:var(--bg3);cursor:pointer;display:flex;align-items:center;gap:7px;padding:7px 8px;transition:all .18s;position:relative;flex-shrink:0;text-align:left;}
.lang-side-btn:hover{border-color:var(--accent);transform:scale(1.05);}
.lang-side-btn.active{border-color:var(--accent);background:rgba(108,99,255,.18);box-shadow:0 2px 12px rgba(108,99,255,.25);}
.lang-side-btn .word-badge{background:rgba(108,99,255,.15);border:1px solid var(--accent);border-radius:5px;font-size:.55rem;font-weight:800;padding:1px 5px;color:var(--accent);white-space:nowrap;margin-left:auto;flex-shrink:0;}
.lang-side-btn .side-flag{font-size:1.3rem;flex-shrink:0;}
.lang-side-btn .side-name{font-size:.68rem;font-weight:800;font-family:'Nunito',sans-serif;color:var(--muted);line-height:1.2;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.lang-side-btn.active .side-name{color:#fff;}
.lang-side-btn.active{border-color:var(--accent);background:rgba(108,99,255,.2);}
.lang-side-btn:hover{border-color:var(--accent);background:var(--bg3);}
.side-sep{width:36px;height:1px;background:var(--border);margin:6px auto;}
/* ── SUBNAV (tab bar below header) ── */
.subnav{display:flex;gap:0;border-bottom:1px solid var(--border);margin:-16px -16px 16px;padding:0 12px;overflow-x:auto;scrollbar-width:none;background:var(--bg2);}
.subnav::-webkit-scrollbar{display:none;}
.subnav-btn{padding:12px 16px;border:none;background:transparent;color:var(--muted);cursor:pointer;font-size:.82rem;font-weight:800;font-family:'Nunito',sans-serif;border-bottom:2px solid transparent;white-space:nowrap;transition:all .2s;}
.subnav-btn:hover{color:var(--text);}
.subnav-btn.active{color:var(--accent);border-bottom-color:var(--accent);}
/* legacy compat */
.nav-btn{display:none;}
.nav-sep{display:none;}
.lang-nav-btn{width:44px;height:44px;border-radius:12px;border:2px solid transparent;background:var(--bg3);cursor:pointer;font-size:1.3rem;display:flex;align-items:center;justify-content:center;transition:all .2s;}
.lang-nav-btn:hover{border-color:var(--accent);}
.lang-nav-btn.active{border-color:var(--accent);background:rgba(124,92,252,0.15);}
.content{flex:1;overflow-y:auto;padding:24px;}

/* ── SCREENS ── */
.screen{display:none;animation:fadeIn .3s ease;}
.screen.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}

/* ── HOME ── */
.home-hero{background:linear-gradient(135deg,rgba(124,92,252,0.2),rgba(252,92,125,0.15));border:1px solid rgba(124,92,252,0.3);border-radius:24px;padding:28px;margin-bottom:20px;position:relative;overflow:hidden;}
.home-hero::after{content:'🌍';position:absolute;right:20px;top:50%;transform:translateY(-50%);font-size:4rem;opacity:.3;}
.home-title{font-family:'Bebas Neue',sans-serif;font-size:2.2rem;letter-spacing:1px;line-height:1;}
.home-sub{color:var(--muted);margin-top:6px;font-size:.9rem;}
.level-bar{margin-top:16px;}
.level-info{display:flex;justify-content:space-between;font-size:.78rem;color:var(--muted);margin-bottom:6px;}
.bar{background:var(--border);border-radius:6px;height:8px;overflow:hidden;}
.bar-fill{height:100%;border-radius:6px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .8s cubic-bezier(.4,0,.2,1);}

.section-title{font-size:.72rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);font-weight:800;margin-bottom:12px;margin-top:24px;}
.langs-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:12px;}
.lang-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:14px;transition:all .2s;text-align:center;position:relative;}
.lang-card:hover{border-color:var(--accent);box-shadow:0 4px 20px rgba(124,92,252,0.15);}
.lang-card.has-progress{border-color:rgba(124,92,252,0.4);}
.lang-card.current-lang{border-color:var(--accent);background:rgba(108,99,255,.07);}
.lc-load-btn{width:100%;margin-top:8px;padding:6px 0;border-radius:10px;border:1.5px dashed var(--accent);background:transparent;color:var(--accent);font-size:.72rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .15s;}
.lc-load-btn:hover{background:var(--accent);color:#fff;}
.lc-load-btn.loading{opacity:.6;cursor:not-allowed;animation:pulse 1s infinite;}
.lc-load-btn.done{border-style:solid;border-color:#22c55e;color:#22c55e;}
@keyframes pulse{0%,100%{opacity:.6}50%{opacity:1}}
.lang-flag{font-size:2rem;display:block;margin-bottom:8px;}
.lang-name{font-size:.82rem;font-weight:700;}
.lang-prog{font-size:.7rem;color:var(--muted);margin-top:4px;}
.lang-stars{color:var(--gold);font-size:.75rem;margin-top:4px;}

.quick-actions{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:4px;}
.qa-btn{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px;cursor:pointer;transition:all .2s;text-align:left;}
.qa-btn:hover{border-color:var(--accent);transform:translateY(-2px);}
.qa-icon{font-size:1.6rem;margin-bottom:6px;display:block;}
.qa-title{font-weight:800;font-size:.9rem;}
.qa-sub{color:var(--muted);font-size:.75rem;margin-top:2px;}

/* ── FLASHCARDS (SRS) ── */
.srs-wrap{max-width:500px;margin:0 auto;}
.srs-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.srs-prog-text{font-size:.82rem;color:var(--muted);}
.srs-bar{flex:1;margin:0 16px;background:var(--border);border-radius:4px;height:6px;}
.srs-bar-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--green));transition:width .4s;}

.flashcard{perspective:1000px;height:280px;margin-bottom:24px;cursor:pointer;}
.flashcard-inner{width:100%;height:100%;transition:transform .5s cubic-bezier(.4,0,.2,1);transform-style:preserve-3d;position:relative;}
.flashcard.flipped .flashcard-inner{transform:rotateY(180deg);}
.fc-face{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:24px;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;border:2px solid var(--border);}
.fc-front{background:linear-gradient(145deg,var(--card),var(--bg3));}
.fc-back{background:linear-gradient(145deg,rgba(124,92,252,.15),rgba(6,214,160,.1));transform:rotateY(180deg);border-color:rgba(124,92,252,.4);}
.fc-word{font-family:'Bebas Neue',sans-serif;font-size:3rem;letter-spacing:2px;text-align:center;line-height:1.1;}
.fc-phonetic{color:var(--accent);font-size:1rem;margin-top:8px;font-style:italic;}
.fc-category{font-size:.7rem;text-transform:uppercase;letter-spacing:2px;color:var(--muted);margin-bottom:16px;}
.fc-hint{font-size:.78rem;color:var(--muted);margin-top:auto;}
.fc-translation{font-size:1.4rem;font-weight:800;text-align:center;color:var(--green);}
.fc-example{font-size:.85rem;color:var(--text);margin-top:12px;text-align:center;line-height:1.5;opacity:.85;}
.fc-example-tr{font-size:.78rem;color:var(--muted);margin-top:4px;text-align:center;}
.fc-stars{display:flex;gap:4px;margin-top:12px;}
.fc-star{font-size:1.1rem;transition:transform .2s;}

.srs-actions{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
.srs-btn{padding:14px;border-radius:14px;border:none;cursor:pointer;font-family:'Nunito',sans-serif;font-weight:800;font-size:.85rem;transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:4px;}
.srs-btn span:first-child{font-size:1.4rem;}
.srs-no{background:rgba(252,92,125,.15);color:#fc5c7d;border:1px solid rgba(252,92,125,.3);}
.srs-no:hover{background:rgba(252,92,125,.25);}
.srs-hard{background:rgba(247,127,0,.15);color:#f77f00;border:1px solid rgba(247,127,0,.3);}
.srs-hard:hover{background:rgba(247,127,0,.25);}
.srs-good{background:rgba(6,214,160,.15);color:#06d6a0;border:1px solid rgba(6,214,160,.3);}
.srs-good:hover{background:rgba(6,214,160,.25);}

.swipe-hint{text-align:center;font-size:.75rem;color:var(--muted);margin-top:8px;}

/* ── MINI-GAMES ── */
.games-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:14px;}
.game-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:20px 16px;cursor:pointer;transition:all .25s;text-align:center;}
.game-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.4);}
.game-icon{font-size:2.5rem;margin-bottom:10px;display:block;}
.game-name{font-weight:800;font-size:.95rem;}
.game-desc{font-size:.72rem;color:var(--muted);margin-top:4px;}
.game-diff{margin-top:8px;font-size:.65rem;text-transform:uppercase;letter-spacing:1px;padding:2px 8px;border-radius:10px;display:inline-block;}
.diff-easy{background:rgba(6,214,160,.15);color:var(--green);}
.diff-med{background:rgba(255,209,102,.15);color:var(--gold);}
.diff-hard{background:rgba(252,92,125,.15);color:var(--accent2);}

/* ── GAME AREA ── */
.game-area{max-width:520px;margin:0 auto;}
.game-header{display:flex;align-items:center;gap:12px;margin-bottom:20px;}
.back-btn{background:var(--bg3);border:1px solid var(--border);border-radius:12px;padding:8px 16px;color:var(--text);cursor:pointer;font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;}
.game-title-bar{font-family:'Bebas Neue',sans-serif;font-size:1.5rem;letter-spacing:1px;}
.game-score-bar{display:flex;gap:10px;margin-left:auto;}
.g-score{background:var(--bg3);border:1px solid var(--border);padding:5px 12px;border-radius:20px;font-size:.78rem;font-weight:700;}

/* MCQ */
.mcq-question{background:var(--card);border:2px solid var(--border);border-radius:20px;padding:32px;text-align:center;margin-bottom:20px;}
.mcq-q-word{font-size:2.8rem;font-weight:900;margin-bottom:6px;}
.mcq-q-phonetic{color:var(--accent);font-size:.9rem;font-style:italic;}
.mcq-options{display:grid;gap:10px;}
.mcq-opt{background:var(--bg3);border:2px solid var(--border);border-radius:14px;padding:14px 20px;cursor:pointer;font-size:.95rem;font-weight:700;transition:all .2s;text-align:left;}
.mcq-opt:hover{border-color:var(--accent);background:rgba(124,92,252,.1);}
.mcq-opt.correct{border-color:var(--green);background:rgba(6,214,160,.15);color:var(--green);}
.mcq-opt.wrong{border-color:var(--accent2);background:rgba(252,92,125,.15);color:var(--accent2);}

/* MATCH */
.match-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.match-item{background:var(--bg3);border:2px solid var(--border);border-radius:14px;padding:14px;cursor:pointer;text-align:center;font-weight:700;font-size:.9rem;transition:all .2s;min-height:56px;display:flex;align-items:center;justify-content:center;}
.match-item:hover{border-color:var(--accent);}
.match-item.selected{border-color:var(--accent);background:rgba(124,92,252,.2);}
.match-item.matched{border-color:var(--green);background:rgba(6,214,160,.15);color:var(--green);cursor:default;}
.match-item.wrong-match{border-color:var(--accent2);background:rgba(252,92,125,.15);animation:shake .3s ease;}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-6px);}75%{transform:translateX(6px);}}}

/* FILL BLANK */
.fill-sentence{background:var(--card);border:2px solid var(--border);border-radius:20px;padding:28px;text-align:center;margin-bottom:20px;font-size:1.1rem;line-height:2;}
.fill-blank{display:inline-block;min-width:80px;border-bottom:3px solid var(--accent);margin:0 8px;text-align:center;font-weight:800;color:var(--accent);}
.fill-options{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;}
.fill-opt{background:var(--bg3);border:2px solid var(--border);border-radius:12px;padding:10px 18px;cursor:pointer;font-weight:700;font-size:.9rem;transition:all .2s;}
.fill-opt:hover{border-color:var(--accent);}
.fill-opt.used{opacity:.35;cursor:not-allowed;}

/* LISTEN */
.listen-card{background:var(--card);border:2px solid var(--border);border-radius:20px;padding:32px;text-align:center;margin-bottom:20px;}
.listen-btn{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:50%;width:80px;height:80px;font-size:1.8rem;cursor:pointer;margin:0 auto 20px;display:flex;align-items:center;justify-content:center;transition:transform .2s;box-shadow:0 8px 30px rgba(124,92,252,.4);}
.listen-btn:hover{transform:scale(1.08);}
.listen-btn.playing{animation:soundPulse 1s infinite;}
@keyframes soundPulse{0%,100%{box-shadow:0 8px 30px rgba(124,92,252,.4);}50%{box-shadow:0 8px 50px rgba(124,92,252,.8);}}
.listen-options{display:grid;gap:10px;}

/* WORD BUILD */
.wbuild-target{background:var(--card);border:2px solid var(--border);border-radius:20px;padding:20px;text-align:center;margin-bottom:16px;}
.wbuild-definition{font-size:.9rem;color:var(--muted);margin-bottom:8px;}
.wbuild-answer{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;min-height:44px;padding:8px;background:var(--bg3);border-radius:12px;margin-bottom:12px;}
.wbuild-slot{background:var(--bg2);border:2px dashed var(--border);border-radius:8px;padding:8px 14px;font-weight:800;cursor:pointer;font-size:.95rem;min-width:36px;text-align:center;transition:all .2s;}
.wbuild-slot:hover{border-color:var(--accent2);}
.wbuild-letters{display:flex;flex-wrap:wrap;gap:6px;justify-content:center;}
.wbuild-letter{background:linear-gradient(145deg,var(--accent),rgba(124,92,252,.7));border:none;border-radius:10px;padding:10px 14px;font-weight:900;cursor:pointer;font-size:1rem;color:#fff;transition:all .2s;font-family:'Nunito',sans-serif;}
.wbuild-letter:hover{transform:translateY(-2px);box-shadow:0 4px 15px rgba(124,92,252,.4);}
.wbuild-letter.used{opacity:.3;cursor:not-allowed;transform:none;}

/* ── AI CHAT ── */
.ai-wrap{max-width:600px;margin:0 auto;}
.ai-messages{min-height:300px;max-height:400px;overflow-y:auto;padding:16px;background:var(--card);border:1px solid var(--border);border-radius:20px 20px 0 0;display:flex;flex-direction:column;gap:12px;}
.msg{padding:12px 16px;border-radius:16px;max-width:85%;font-size:.9rem;line-height:1.5;}
.msg-ai{background:var(--bg3);border:1px solid var(--border);align-self:flex-start;border-radius:4px 16px 16px 16px;}
.msg-user{background:linear-gradient(135deg,var(--accent),rgba(124,92,252,.8));align-self:flex-end;border-radius:16px 16px 4px 16px;}
.ai-input-wrap{display:flex;gap:0;background:var(--bg3);border:1px solid var(--border);border-top:none;border-radius:0 0 20px 20px;overflow:hidden;}
.ai-input{flex:1;background:transparent;border:none;padding:14px 16px;color:var(--text);font-family:'Nunito',sans-serif;font-size:.9rem;outline:none;}
.ai-send{background:var(--accent);border:none;padding:12px 20px;color:#fff;cursor:pointer;font-size:1.1rem;transition:background .2s;}
.ai-send:hover{background:var(--accent2);}
.ai-suggestions{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px;}
.ai-sug{background:var(--bg3);border:1px solid var(--border);border-radius:20px;padding:6px 14px;font-size:.78rem;cursor:pointer;transition:all .2s;font-weight:600;}
.ai-sug:hover{border-color:var(--accent);color:var(--accent);}
.ai-thinking{display:flex;gap:4px;align-items:center;padding:8px 12px;}
.dot{width:6px;height:6px;border-radius:50%;background:var(--muted);animation:blink 1.2s infinite;}
.dot:nth-child(2){animation-delay:.2s;}
.dot:nth-child(3){animation-delay:.4s;}
@keyframes blink{0%,80%,100%{opacity:.3;}40%{opacity:1;}}

/* ── PROFILE ── */
.profile-hero{background:linear-gradient(135deg,rgba(124,92,252,.2),rgba(252,92,125,.15));border:1px solid rgba(124,92,252,.3);border-radius:24px;padding:24px;text-align:center;margin-bottom:20px;}
.profile-avatar{font-size:4rem;margin-bottom:8px;}
.profile-name{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:1px;}
.profile-level{color:var(--accent);font-weight:800;font-size:.9rem;}
.stats-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:16px;text-align:center;}
.stat-num{font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:1px;}
.stat-label{font-size:.72rem;color:var(--muted);text-transform:uppercase;letter-spacing:1px;}
.badges-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:10px;}
.badge-item{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 8px;text-align:center;}
.badge-icon{font-size:1.8rem;display:block;margin-bottom:4px;}
.badge-name{font-size:.65rem;color:var(--muted);}
.badge-item.locked{opacity:.4;filter:grayscale(1);}

/* ── VOCAB SECTION ── */
.vocab-section{max-width:700px;}
.domain-pills{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:16px;}
.domain-pill{padding:6px 14px;border-radius:20px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:.78rem;font-weight:700;font-family:'Nunito',sans-serif;transition:all .2s;}
.domain-pill.active{background:var(--accent);border-color:var(--accent);color:#fff;}
/* ── MOSALINGUA-STYLE DECK SYSTEM ── */
.mosa-header{padding:0 0 12px;border-bottom:1px solid var(--border);margin-bottom:16px;}
.mosa-level-tabs{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;scrollbar-width:none;margin-bottom:16px;}
.mosa-level-tabs::-webkit-scrollbar{display:none;}
.mosa-level-tab{padding:7px 16px;border-radius:20px;border:1.5px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:.78rem;font-weight:800;font-family:'Nunito',sans-serif;white-space:nowrap;transition:all .2s;}
.mosa-level-tab.active{color:#fff;border-color:transparent;}
.mosa-level-tab[data-level="all"].active{background:var(--accent);}
.mosa-level-tab[data-level="A1"].active{background:#22c55e;}
.mosa-level-tab[data-level="A2"].active{background:#3b82f6;}
.mosa-level-tab[data-level="B1"].active{background:#f59e0b;}
.mosa-level-tab[data-level="B2"].active{background:#ef4444;}
.mosa-level-tab[data-level="new"].active{background:#8b5cf6;}
.mosa-level-tab[data-level="learning"].active{background:#f59e0b;}
.mosa-level-tab[data-level="mastered"].active{background:#22c55e;}
.mosa-decks{display:flex;flex-direction:column;gap:12px;}
.mosa-deck{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;transition:all .2s;cursor:pointer;}
.mosa-deck:hover{border-color:var(--accent);box-shadow:0 4px 20px rgba(108,71,255,.15);transform:translateY(-1px);}
.mosa-deck-header{display:flex;align-items:center;gap:14px;padding:16px;}
.mosa-deck-icon{width:46px;height:46px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;}
.mosa-deck-info{flex:1;min-width:0;}
.mosa-deck-title{font-weight:800;font-size:.95rem;margin-bottom:2px;}
.mosa-deck-sub{font-size:.75rem;color:var(--muted);margin-bottom:6px;}
.mosa-deck-bar-wrap{background:var(--bg3);border-radius:4px;height:6px;overflow:hidden;}
.mosa-deck-bar{height:100%;border-radius:4px;transition:width .6s ease;}
.mosa-deck-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0;}
.mosa-deck-count{font-size:.8rem;font-weight:800;}
.mosa-deck-badge{font-size:.65rem;font-weight:800;padding:3px 8px;border-radius:8px;text-transform:uppercase;letter-spacing:.5px;}
.mosa-deck-words{padding:0 16px 16px;display:none;flex-direction:column;gap:8px;}
.mosa-deck.open .mosa-deck-words{display:flex;}
.mosa-deck.open .mosa-deck-chevron{transform:rotate(180deg);}
.mosa-deck-chevron{transition:transform .25s;color:var(--muted);font-size:.9rem;}
.mosa-word-row{background:var(--bg2);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:12px;cursor:pointer;transition:all .15s;}
.mosa-word-row:hover{background:var(--bg3);}
.mosa-word-row.mastered{border-left:3px solid #22c55e;}
.mosa-word-row.learning{border-left:3px solid #f59e0b;}
.mosa-word-row.new{border-left:3px solid var(--border);}
.mwr-word{font-weight:800;font-size:.95rem;min-width:100px;}
.mwr-roman{color:var(--accent);font-size:.72rem;font-style:italic;flex:1;min-width:0;}
.mwr-phonetic{color:var(--accent);font-size:.72rem;font-style:italic;flex:1;}
.mwr-fr{color:var(--muted);font-size:.82rem;min-width:70px;text-align:right;}
.mwr-variants{font-size:.65rem;color:var(--muted);grid-column:1/-1;padding:3px 8px;background:var(--bg3);border-radius:6px;display:flex;gap:8px;flex-wrap:wrap;}
.mwr-var-tag{display:inline-flex;align-items:center;gap:3px;}
.mwr-var-flag{font-size:.75rem;}
.mwr-status{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;flex-shrink:0;}
.mwr-status.s-new{background:var(--bg3);color:var(--muted);}
.mwr-status.s-learning{background:rgba(245,158,11,.2);color:#f59e0b;}
.mwr-status.s-mastered{background:rgba(34,197,94,.2);color:#22c55e;}
.mosa-empty{text-align:center;padding:40px 20px;color:var(--muted);}
.mosa-stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.mosa-stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px;text-align:center;}
.mosa-stat-val{font-size:1.4rem;font-weight:900;font-family:'Bebas Neue',sans-serif;}
.mosa-stat-lbl{font-size:.68rem;color:var(--muted);font-weight:700;margin-top:2px;}
.load-more-btn{width:100%;padding:14px;border-radius:16px;border:2px dashed var(--accent);background:transparent;color:var(--accent);font-size:.95rem;font-weight:800;font-family:'Nunito',sans-serif;cursor:pointer;transition:all .2s;margin-bottom:8px;}
.load-more-btn:hover:not(:disabled){background:var(--accent);color:#fff;transform:translateY(-2px);box-shadow:0 4px 20px rgba(108,99,255,.3);}
.load-more-btn:disabled{opacity:.5;cursor:not-allowed;}
/* ── LEÇONS ── */
.lessons-header{margin-bottom:16px;}
.lesson-tip{background:rgba(108,99,255,.12);border:1px solid rgba(108,99,255,.3);border-radius:12px;padding:12px 16px;font-size:.85rem;margin-bottom:16px;color:var(--text);}
.lessons-list{display:flex;flex-direction:column;gap:12px;}
.lesson-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s;}
.lesson-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:0 4px 20px rgba(108,99,255,.15);}
.lesson-card.done{border-color:rgba(34,197,94,.4);background:rgba(34,197,94,.05);}
.lc-emoji{font-size:2.2rem;min-width:44px;text-align:center;}
.lc-info{flex:1;}
.lc-title{font-weight:800;font-size:1rem;margin-bottom:2px;}
.lc-desc{color:var(--muted);font-size:.82rem;margin-bottom:6px;}
.lc-meta{display:flex;align-items:center;gap:8px;}
.lc-badge{background:var(--accent);color:#fff;font-size:.7rem;font-weight:800;padding:2px 8px;border-radius:8px;}
.lc-done{color:#22c55e;font-size:.8rem;font-weight:700;}
.lc-arrow{font-size:1.2rem;color:var(--muted);}
/* Lesson runner */
.lesson-runner{padding-bottom:80px;}
.lesson-top-bar{display:flex;align-items:center;gap:8px;margin-bottom:24px;}
.lesson-progress-bar{height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.lesson-body{animation:slideUp .25s ease;}
.lesson-step-intro{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px 20px;text-align:center;}
.lesson-flash-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:28px 20px;text-align:center;}
.lfc-word{font-size:2.8rem;font-weight:800;margin-bottom:8px;line-height:1.2;}
.lfc-phonetic{color:var(--accent);font-size:1rem;font-style:italic;margin-bottom:12px;}
.lfc-fr{font-size:1.4rem;font-weight:700;margin-bottom:16px;}
.lfc-example{background:var(--bg3);border-radius:12px;padding:14px;margin-top:8px;text-align:left;}
.lesson-quiz{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px 18px;}
.quiz-options{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.quiz-opt{padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);color:var(--text);font-family:'Nunito',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .15s;}
.quiz-opt:hover:not(:disabled){border-color:var(--accent);background:rgba(108,99,255,.1);}
.quiz-opt:disabled{cursor:default;}
/* ── ALPHABETS ── */
.alpha-tabs{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.alpha-tab{padding:8px 14px;border-radius:12px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);font-family:'Nunito',sans-serif;font-size:.8rem;font-weight:700;cursor:pointer;transition:all .2s;}
.alpha-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.alpha-desc{background:var(--bg2);border-radius:12px;padding:10px 14px;font-size:.85rem;color:var(--muted);margin-bottom:14px;}
.alpha-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(88px,1fr));gap:10px;margin-bottom:20px;}
.alpha-card{height:100px;cursor:pointer;perspective:600px;}
.alpha-card-inner{position:relative;width:100%;height:100%;transform-style:preserve-3d;transition:transform .4s;}
.alpha-card.flipped .alpha-card-inner{transform:rotateY(180deg);}
.alpha-front,.alpha-back{position:absolute;width:100%;height:100%;backface-visibility:hidden;border-radius:14px;border:1px solid var(--border);background:var(--card);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:8px;}
.alpha-back{transform:rotateY(180deg);background:rgba(108,99,255,.12);border-color:var(--accent);}
.alpha-char{font-size:2rem;font-weight:800;line-height:1;}
.alpha-name{font-size:.68rem;color:var(--muted);margin-top:4px;text-align:center;}
.alpha-sound{font-size:.78rem;font-weight:800;color:var(--accent);text-align:center;margin-bottom:4px;}
.alpha-example{font-size:.62rem;color:var(--muted);text-align:center;line-height:1.3;}

.vocab-list{display:flex;flex-direction:column;gap:8px;}
.vocab-row{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 18px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:all .2s;}
.vocab-row:hover{border-color:var(--accent);}
.vr-word{font-weight:800;font-size:1rem;min-width:130px;}
.vr-phonetic{color:var(--accent);font-size:.78rem;font-style:italic;min-width:100px;}
.vr-fr{color:var(--muted);font-size:.85rem;flex:1;}
.vr-stars{display:flex;gap:2px;}
.vr-star{font-size:.85rem;}
.vr-star.lit{color:var(--gold);}
.vr-star.dim{color:var(--border);}

/* ── BACKUP / SAUVEGARDE ── */
.backup-section{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:18px;margin-top:16px;}
.backup-title{font-weight:900;font-size:.95rem;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.backup-row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:10px;}
.backup-btn{flex:1;min-width:130px;padding:11px 14px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg2);color:var(--text);font-family:'Nunito',sans-serif;font-weight:800;font-size:.82rem;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:6px;justify-content:center;}
.backup-btn:hover{border-color:var(--accent);background:rgba(108,71,255,.06);color:var(--accent);}
.backup-btn.danger:hover{border-color:#ef4444;color:#ef4444;background:rgba(239,68,68,.06);}
.backup-btn.success{border-color:#22c55e;background:rgba(34,197,94,.08);color:#16a34a;}
.backup-status{font-size:.78rem;color:var(--muted);margin-top:4px;min-height:18px;}
.backup-drive-info{font-size:.78rem;background:rgba(66,133,244,.08);border:1px solid rgba(66,133,244,.2);border-radius:10px;padding:10px 12px;color:#1a56db;margin-top:8px;line-height:1.5;}
.autosave-indicator{display:inline-flex;align-items:center;gap:5px;font-size:.75rem;color:var(--muted);background:var(--bg3);border-radius:20px;padding:3px 10px;font-weight:700;}
.autosave-dot{width:6px;height:6px;border-radius:50%;background:#22c55e;animation:pulse 2s infinite;}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── OVERVIEW DASHBOARD ── */
.overview-dashboard{display:flex;flex-direction:column;gap:10px;margin-bottom:20px;}
.overview-cta-primary{display:flex;align-items:center;gap:14px;width:100%;padding:16px 18px;background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:18px;color:#fff;cursor:pointer;font-family:'Nunito',sans-serif;text-align:left;transition:transform .15s,box-shadow .15s;box-shadow:0 4px 16px rgba(108,71,255,.3);}
.overview-cta-primary:hover{transform:translateY(-2px);box-shadow:0 6px 22px rgba(108,71,255,.4);}
.overview-cta-done{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.3);color:#16a34a;border-radius:14px;padding:12px 16px;font-weight:700;font-size:.88rem;text-align:center;}
.overview-stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;}
.overview-stat{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:12px 8px;text-align:center;cursor:pointer;transition:all .15s;}
.overview-stat:hover{border-color:var(--accent);transform:translateY(-1px);}
.overview-stat-val{font-size:1.3rem;font-weight:900;line-height:1.2;}
.overview-stat-lbl{font-size:.65rem;color:var(--muted);font-weight:700;text-transform:uppercase;letter-spacing:.3px;margin-top:2px;}
.overview-load-btn{width:100%;padding:13px;background:var(--card);border:1.5px dashed var(--border);border-radius:14px;color:var(--text);font-family:'Nunito',sans-serif;font-weight:800;font-size:.88rem;cursor:pointer;transition:all .2s;text-align:center;}
.overview-load-btn:hover{border-color:var(--accent);background:rgba(108,71,255,.05);color:var(--accent);}

/* ── AUDIO BUTTONS ── */
.play-audio-btn{background:rgba(108,99,255,.12);border:1px solid rgba(108,99,255,.25);border-radius:10px;padding:5px 10px;cursor:pointer;font-size:.85rem;color:var(--accent);transition:all .2s;white-space:nowrap;}
.play-audio-btn:hover{background:var(--accent);color:#fff;transform:scale(1.05);}
.play-audio-btn.playing{background:var(--accent);color:#fff;animation:audioPulse .6s ease infinite alternate;}
.slow-btn{background:rgba(245,158,11,.1);border-color:rgba(245,158,11,.3);color:#f59e0b;}
.slow-btn:hover{background:#f59e0b;color:#fff;}
@keyframes audioPulse{from{transform:scale(1);}to{transform:scale(1.08);}}

/* ── LEARN / PARCOURS SECTION ── */
.learn-map{display:flex;flex-direction:column;align-items:center;gap:0;padding:8px 0 80px;}
.learn-unit{width:100%;max-width:420px;margin-bottom:4px;}
.learn-unit-header{display:flex;align-items:center;gap:12px;padding:14px 16px;background:var(--card);border:1px solid var(--border);border-radius:16px;cursor:pointer;transition:all .2s;margin-bottom:8px;}
.learn-unit-header:hover{border-color:var(--accent);}
.learn-unit-header.unlocked{border-color:var(--accent);background:rgba(108,99,255,.08);}
.learn-unit-header.completed{border-color:#22c55e;background:rgba(34,197,94,.07);}
.learn-unit-header.locked{opacity:.5;cursor:not-allowed;}
.learn-unit-icon{width:48px;height:48px;border-radius:14px;display:flex;align-items:center;justify-content:center;font-size:1.5rem;flex-shrink:0;}
.learn-unit-info{flex:1;}
.learn-unit-title{font-weight:800;font-size:.95rem;margin-bottom:2px;}
.learn-unit-sub{font-size:.75rem;color:var(--muted);}
.learn-unit-badge{font-size:.7rem;font-weight:800;padding:3px 9px;border-radius:8px;}
.learn-lessons-list{display:flex;flex-direction:column;gap:6px;padding:0 8px 8px;}
.learn-lesson-item{display:flex;align-items:center;gap:12px;padding:11px 14px;background:var(--bg3);border-radius:12px;cursor:pointer;transition:all .15s;border:1px solid transparent;}
.learn-lesson-item:hover{border-color:var(--accent);background:var(--card);}
.learn-lesson-item.done{border-color:rgba(34,197,94,.3);}
.learn-lesson-item.locked{opacity:.45;cursor:not-allowed;}
.lli-icon{font-size:1.2rem;width:32px;text-align:center;}
.lli-info{flex:1;}
.lli-title{font-size:.85rem;font-weight:800;}
.lli-type{font-size:.7rem;color:var(--muted);}
.lli-status{font-size:.85rem;}
.learn-connector{width:2px;height:20px;background:var(--border);margin:0 auto;}
.learn-connector.done{background:#22c55e;}

/* ── LEARN EXERCISE SCREEN ── */
.ex-wrap{padding-bottom:80px;}
.ex-top{display:flex;align-items:center;gap:10px;margin-bottom:20px;}
.ex-progress{flex:1;height:8px;background:var(--bg3);border-radius:4px;overflow:hidden;}
.ex-progress-fill{height:100%;border-radius:4px;background:linear-gradient(90deg,var(--accent),var(--accent2));transition:width .4s;}
.ex-hearts{display:flex;gap:3px;font-size:1rem;}
.ex-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:24px 20px;margin-bottom:16px;animation:slideUp .25s ease;}
.ex-instruction{font-size:.78rem;font-weight:800;color:var(--accent);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;}
.ex-word-big{font-size:2.4rem;font-weight:900;text-align:center;margin:12px 0;line-height:1.2;}
.ex-phonetic{text-align:center;color:var(--accent);font-style:italic;font-size:.95rem;margin-bottom:6px;}
.ex-translation{text-align:center;color:var(--muted);font-size:1rem;margin-bottom:16px;}
.ex-audio-row{display:flex;gap:8px;justify-content:center;margin:12px 0;}
.ex-choices{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.ex-choice{padding:14px 12px;border-radius:14px;border:2px solid var(--border);background:var(--bg3);color:var(--text);font-family:'Nunito',sans-serif;font-weight:700;font-size:.9rem;cursor:pointer;transition:all .15s;text-align:center;}
.ex-choice:hover:not(:disabled){border-color:var(--accent);background:rgba(108,99,255,.1);}
.ex-choice.correct{border-color:#22c55e;background:rgba(34,197,94,.15);color:#22c55e;}
.ex-choice.wrong{border-color:#ef4444;background:rgba(239,68,68,.1);color:#ef4444;}
.ex-choice:disabled{cursor:default;}
.ex-fill-input{width:100%;padding:14px;border-radius:14px;border:2px solid var(--border);background:var(--bg3);color:var(--text);font-family:'Nunito',sans-serif;font-size:1.1rem;font-weight:700;text-align:center;outline:none;transition:border .2s;box-sizing:border-box;}
.ex-fill-input:focus{border-color:var(--accent);}
.ex-fill-input.correct{border-color:#22c55e;background:rgba(34,197,94,.1);}
.ex-fill-input.wrong{border-color:#ef4444;background:rgba(239,68,68,.07);}
.ex-sentence{font-size:1.1rem;line-height:1.8;margin:12px 0;text-align:center;}
.ex-blank{display:inline-block;min-width:80px;border-bottom:2px solid var(--accent);color:var(--accent);font-weight:800;padding:0 4px;}
.ex-feedback{border-radius:14px;padding:14px 16px;margin-top:10px;font-weight:700;font-size:.9rem;}
.ex-feedback.correct{background:rgba(34,197,94,.12);border:1px solid rgba(34,197,94,.3);color:#22c55e;}
.ex-feedback.wrong{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);color:#ef4444;}
.ex-next-btn{width:100%;padding:14px;border-radius:16px;border:none;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;cursor:pointer;margin-top:12px;transition:transform .15s;}
.ex-next-btn:hover{transform:translateY(-2px);}
.ex-result{text-align:center;padding:40px 20px;}

/* Dialogue */
.dialogue-scene{background:linear-gradient(135deg,rgba(108,99,255,.1),rgba(168,85,247,.1));border:1px solid rgba(108,99,255,.2);border-radius:18px;padding:20px;margin-bottom:16px;}
.dialogue-chars{display:flex;justify-content:space-between;margin-bottom:16px;}
.dialogue-char{text-align:center;}
.dialogue-char-avatar{font-size:2.5rem;display:block;margin-bottom:4px;}
.dialogue-char-name{font-size:.72rem;font-weight:800;color:var(--muted);}
.dialogue-bubble{background:var(--card);border-radius:16px;padding:14px 16px;margin-bottom:10px;position:relative;}
.dialogue-bubble.left{margin-right:20%;border-bottom-left-radius:4px;}
.dialogue-bubble.right{margin-left:20%;border-bottom-right-radius:4px;background:rgba(108,99,255,.1);}
.dialogue-bubble-text{font-size:1rem;font-weight:700;margin-bottom:4px;}
.dialogue-bubble-tr{font-size:.8rem;color:var(--muted);}
.dialogue-input-area{margin-top:12px;}
.dialogue-hint{font-size:.78rem;color:var(--muted);margin-bottom:8px;font-style:italic;}


/* ── GRAMMAR SECTION ── */
.grammar-hero{background:linear-gradient(135deg,rgba(108,71,255,.08),rgba(255,77,141,.06));border:1px solid rgba(108,71,255,.15);border-radius:20px;padding:20px;margin-bottom:18px;}
.grammar-tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px;}
.grammar-tab{padding:8px 16px;border-radius:20px;border:1.5px solid var(--border);background:var(--bg3);color:var(--muted);cursor:pointer;font-size:.8rem;font-weight:800;font-family:'Nunito',sans-serif;transition:all .2s;}
.grammar-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.grammar-tab:hover:not(.active){border-color:var(--accent);color:var(--accent);}

/* Fiche de grammaire */
.grammar-card{background:var(--card);border:1px solid var(--border);border-radius:18px;margin-bottom:14px;overflow:hidden;box-shadow:0 2px 8px rgba(0,0,0,.05);}
.grammar-card-header{display:flex;align-items:center;gap:12px;padding:16px;cursor:pointer;transition:background .15s;}
.grammar-card-header:hover{background:var(--bg3);}
.grammar-card-icon{width:42px;height:42px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.3rem;flex-shrink:0;}
.grammar-card-title{font-weight:800;font-size:.95rem;flex:1;}
.grammar-card-level{font-size:.7rem;font-weight:800;padding:3px 9px;border-radius:8px;}
.grammar-card-chevron{color:var(--muted);transition:transform .2s;}
.grammar-card.open .grammar-card-chevron{transform:rotate(180deg);}
.grammar-card-body{padding:0 18px 18px;display:none;animation:slideUp .2s ease;}
.grammar-card.open .grammar-card-body{display:block;}
.grammar-rule{background:var(--bg3);border-radius:12px;padding:14px;margin-bottom:10px;}

.grammar-rule-text{font-size:.85rem;line-height:1.7;color:var(--text);}
.grammar-example{background:var(--card);border-left:3px solid var(--accent);padding:10px 14px;border-radius:0 10px 10px 0;margin:8px 0;font-size:.85rem;}
.grammar-native{font-weight:800;font-size:1rem;}
.grammar-roman{color:var(--accent);font-style:italic;font-size:.82rem;}
.grammar-fr{color:var(--muted);font-size:.82rem;}
.grammar-table{width:100%;border-collapse:collapse;margin:10px 0;font-size:.82rem;}
.grammar-table th{background:rgba(108,71,255,.1);color:var(--accent);font-weight:800;padding:8px 10px;text-align:left;border-bottom:2px solid rgba(108,71,255,.2);}
.grammar-table td{padding:8px 10px;border-bottom:1px solid var(--border);}
.grammar-table tr:hover td{background:var(--bg3);}
.grammar-table .native{font-weight:700;font-size:.9rem;}
.grammar-table .roman{color:var(--accent);font-style:italic;font-size:.78rem;}

/* Conjugaison */
.conj-section{margin-top:16px;}
.conj-verb-selector{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:14px;}
.conj-verb-btn{padding:7px 14px;border-radius:12px;border:1.5px solid var(--border);background:var(--bg3);color:var(--text);cursor:pointer;font-weight:700;font-size:.82rem;font-family:'Nunito',sans-serif;transition:all .2s;}
.conj-verb-btn.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.conj-tense-tabs{display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;margin-bottom:12px;padding-bottom:2px;}
.conj-tense-tabs::-webkit-scrollbar{display:none;}
.conj-tense-tab{padding:6px 13px;border-radius:14px;border:1px solid var(--border);background:var(--bg3);color:var(--muted);cursor:pointer;font-size:.75rem;font-weight:800;font-family:'Nunito',sans-serif;white-space:nowrap;transition:all .2s;}
.conj-tense-tab.active{background:var(--accent);border-color:var(--accent);color:#fff;}
.conj-table-wrap{background:var(--card);border:1px solid var(--border);border-radius:16px;overflow:hidden;}
.conj-table{width:100%;border-collapse:collapse;font-size:.85rem;}
.conj-table th{background:rgba(108,71,255,.08);color:var(--accent);font-weight:800;padding:10px 14px;text-align:left;}
.conj-table td{padding:10px 14px;border-top:1px solid var(--border);}
.conj-table tr:hover td{background:var(--bg3);}
.conj-pronoun{color:var(--muted);font-size:.8rem;min-width:80px;}
.conj-form{font-weight:800;}
.conj-roman{color:var(--accent);font-size:.75rem;font-style:italic;display:block;}
.conj-audio{background:none;border:none;cursor:pointer;font-size:.9rem;padding:2px 6px;border-radius:6px;color:var(--accent);transition:background .15s;}
.conj-audio:hover{background:rgba(108,71,255,.1);}

/* Conjugaison exercise */
.conj-exercise{background:linear-gradient(135deg,rgba(108,71,255,.06),rgba(255,77,141,.04));border:1px solid rgba(108,71,255,.15);border-radius:16px;padding:16px;margin-top:14px;}
.conj-ex-title{font-weight:800;font-size:.9rem;margin-bottom:12px;color:var(--accent);}
.conj-ex-row{display:flex;align-items:center;gap:10px;margin-bottom:10px;padding:10px;background:var(--card);border-radius:12px;border:1px solid var(--border);}
.conj-ex-pronoun{font-weight:700;min-width:70px;font-size:.85rem;}
.conj-ex-input{flex:1;padding:8px 12px;border-radius:10px;border:1.5px solid var(--border);background:var(--bg3);color:var(--text);font-family:'Nunito',sans-serif;font-size:.9rem;font-weight:700;outline:none;transition:border .2s;}
.conj-ex-input:focus{border-color:var(--accent);}
.conj-ex-input.correct{border-color:#16a34a;background:rgba(22,163,74,.08);}
.conj-ex-input.wrong{border-color:#dc2626;background:rgba(220,38,38,.06);}
.conj-ex-hint{font-size:.75rem;color:var(--muted);font-style:italic;}

.grammar-loading{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 20px;gap:14px;}
.grammar-spinner{width:40px;height:40px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}

/* ── XP POPUP ── */
.xp-popup{position:fixed;top:80px;right:20px;background:linear-gradient(135deg,var(--accent),var(--accent2));border-radius:16px;padding:12px 20px;font-weight:900;font-size:1.1rem;z-index:999;animation:xpAnim 2s forwards;pointer-events:none;}
@keyframes xpAnim{0%{opacity:0;transform:translateY(10px) scale(.8);}20%{opacity:1;transform:translateY(0) scale(1);}70%{opacity:1;}100%{opacity:0;transform:translateY(-20px);}}

/* ── RESULT SCREEN ── */
.result-card{background:var(--card);border:2px solid var(--border);border-radius:24px;padding:36px;text-align:center;max-width:400px;margin:40px auto;}

.result-sub{color:var(--muted);margin:12px 0 24px;}
.btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:14px;padding:14px 32px;color:#fff;font-family:'Nunito',sans-serif;font-weight:800;font-size:1rem;cursor:pointer;transition:transform .2s;}
.btn-primary:hover{transform:translateY(-2px);}

/* ── LANG SELECTOR MODAL ── */
.modal{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:300;display:none;align-items:center;justify-content:center;padding:20px;}
.modal.open{display:flex;}

.modal-title{font-family:'Bebas Neue',sans-serif;font-size:1.8rem;margin-bottom:16px;letter-spacing:1px;}
.modal-langs{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
.modal-lang-btn{background:var(--bg3);border:1px solid var(--border);border-radius:14px;padding:12px;cursor:pointer;display:flex;align-items:center;gap:10px;transition:all .2s;}
.modal-lang-btn:hover{border-color:var(--accent);}
.modal-lang-btn.active{border-color:var(--accent);background:rgba(124,92,252,.15);}
.modal-flag{font-size:1.4rem;}
.modal-lang-name{font-size:.82rem;font-weight:700;text-align:left;}

  ru:'Russian', ja:'Japanese', zh:'Chinese (Mandarin)',
  ar_lb:'Arabic (Lebanese)', ar_sa:'Arabic (Saudi)', ar_ae:'Arabic (Emirati)',
  nl:'Dutch', pl:'Polish', cs:'Czech',
  he:'Hebrew', dz:'Darija (Maghreb)', dz_ma:'Darija (Morocco)', dz_dz:'Darija (Algeria)', dz_tn:'Darija (Tunisia)',
  fa:'Persian (Farsi)'
};

const RTL_LANGS = new Set(['he','ar_lb','ar_sa','ar_ae','dz','dz_ma','dz_dz','dz_tn','fa']);

// ── Load vocab from persistent storage on startup ──
function loadAllVocabFromStorage() {
  // Load all languages from localStorage (sync, no server needed)
  const allIds = LANGS.map(l => l.id);
  // Also check old darija keys
  const legacyIds = ['dz_ma','dz_dz','dz_tn'];
  for (const id of [...allIds, ...legacyIds]) {
    try {
      const raw = localStorage.getItem('lingua_vocab_' + id);
      if (raw) {
        const words = JSON.parse(raw);
        if (Array.isArray(words) && words.length > 0) {
          // Merge legacy darija into 'dz'
          if (['dz_ma','dz_dz','dz_tn'].includes(id)) {
            if (!VOCAB['dz']) VOCAB['dz'] = [];
            const existing = new Set(VOCAB['dz'].map(w=>w.w));
            words.forEach(w => { if (!existing.has(w.w)) VOCAB['dz'].push(w); });
          } else {
            VOCAB[id] = words;
          }
        }
      }
    } catch(e) { /* not found = normal */ }
  }
  return Promise.resolve(); // keep async compat
}

// ── Save vocab to persistent storage ──
function saveVocabToStorage(id) {
  try {
    localStorage.setItem('lingua_vocab_' + id, JSON.stringify(VOCAB[id]));
  } catch(e) {
    console.warn('Storage save failed:', e);
  }
}

  const ADVANCED_LANGS = ['es','it','pt','en','de','pl','nl','ru','cs','tr'];
  const isAdvanced = ADVANCED_LANGS.includes(id);

  let batchInfo;

  if (batchNum <= 1) {
    // Always start with A1 for everyone
    batchInfo = batchCategories.find(b => b.level === 'A1') || batchCategories[0];
    // Pick the right A1 batch by index
    const a1Batches = batchCategories.filter(b => b.level === 'A1');
    batchInfo = a1Batches[batchNum % a1Batches.length];

  } else if (isBeginner) {
    // STRICT PROGRESSION: A1(0-1) → A2(2-3) → B1(4-5) → B2(6-7) → C1(8-9) → C2(10+)
    const progressMap = [
      {min:0,  max:1,  level:'A1'},
      {min:2,  max:3,  level:'A2'},
      {min:4,  max:5,  level:'B1'},
      {min:6,  max:7,  level:'B2'},
      {min:8,  max:9,  level:'C1'},
      {min:10, max:999,level:'C2'},
    ];
    const targetLevel = (progressMap.find(p => batchNum >= p.min && batchNum <= p.max) || progressMap[progressMap.length-1]).level;
    const levelBatches = batchCategories.filter(b => b.level === targetLevel || b.level === targetLevel+'+');
    batchInfo = levelBatches[(batchNum - 2) % Math.max(levelBatches.length, 1)] || batchCategories[batchNum % batchCategories.length];

  } else if (isAdvanced) {
    // ADVANCED MIX: skip most A1 content, blend A2→C2 with increasing difficulty
    // batch 2+ : weighted random toward higher levels as batchNum grows
    const advancedPool = batchCategories.filter(b => !['A1'].includes(b.level));
    // Weight higher levels more as vocab grows
    const weights = advancedPool.map(b => {
      const lvlScore = {A2:1, B1:2, 'B1+':2, B2:3, 'B2+':3, C1:4, 'C1+':4, C2:5}[b.level] || 2;
      const batchProgress = Math.min(batchNum / 10, 1); // 0→1 over 10 batches
      return Math.max(0.1, lvlScore * batchProgress + (1 - batchProgress));
    });
    const totalWeight = weights.reduce((s,w) => s+w, 0);
    let rand = ((batchNum * 2654435761) % 1000) / 1000 * totalWeight; // deterministic pseudo-random
    let idx = 0;
    for (let i = 0; i < weights.length; i++) {
      rand -= weights[i];
      if (rand <= 0) { idx = i; break; }
    }
    batchInfo = advancedPool[idx] || advancedPool[batchNum % advancedPool.length];

  } else {
    // Default: standard rotation
    batchInfo = batchCategories[batchNum % batchCategories.length];
  }

  const batchLevel = batchInfo.level.replace('+',''); // clean level for display
  const cats = batchInfo.cats;
  const avoidNote = existing.length > 0 
    ? `\nALREADY GENERATED (avoid duplicates): ${existing.slice(0,50).join(', ')}...`
    : '';

  const needsRoman = ['zh','ja','he','ar_lb','ar_sa','ar_ae','dz','fa','ru','ko'].includes(id);
  const scriptNote = needsRoman
    ? `
- "p" field REQUIRED: full romanization in French phonetics (e.g. pinyin for zh, romaji for ja, transliteration for he/ar/fa)
- "w" field: native script only`
    : `
- "p" field: pronunciation hint for French speakers if useful`;

  const prompt = `Generate 150 vocabulary entries for ${langName} (for French speakers). LEVEL: ${batchLevel}. Themes: ${cats.slice(0,6).join(", ")}. Include ALL word types: frequent daily words, medium-use words, rare but important words, set expressions and phrases, slang/informal when level-appropriate. Mix roughly 40pct high-frequency, 35pct medium, 25pct low-frequency words. Difficulty MUST match ${batchLevel} (A1=survival, A2=everyday, B1=intermediate, B2=upper-intermediate, C1=advanced, C2=near-native).\nReturn ONLY a JSON array, no markdown, no explanation. Each entry:\n{"w":"word or expression in ${langName} native script","p":"pronunciation for French speakers","fr":"French 1-4 words","cat":"category","lvl":"${batchLevel}","freq":"high/medium/low","syn":"2-3 synonyms in ${langName} native script comma-separated or empty string","synFr":"French meaning of each synonym comma-separated or empty string","ex":"natural example sentence in ${langName}","exP":"MANDATORY romanization/pronunciation of the example sentence for French speakers (required for zh/ja/ar/he/fa/ru, empty string for latin-script languages)","exFr":"French translation of example","cult":"1 short sentence of cultural context in French: register (formal/informal/slang), regional usage, cultural nuance, or pragmatic note — e.g. 'Utilisé entre amis, jamais en contexte professionnel' or 'Expression typique du dialecte cairote'"}\nRules:${scriptNote}\n- freq: high=daily conversations/TV/social media, medium=work/news/reading, low=formal/literary/specialized\n- syn: synonyms and near-equivalents IN ${langName} (not French) - use empty string "" if no synonyms exist\n- synFr: French meaning of each synonym, matching order, empty string if syn is empty\n- ex: short sentence a real native speaker would say\n- exP: full romanization/transliteration of the ENTIRE example sentence. Required for ${needsRoman?"YES — this language needs it":"latin-script lang, use empty string"}. Use French phonetic conventions where possible\n- cult: brief cultural note in French — register, nuance, regional, pragmatic context. Keep under 15 words. Empty string if nothing notable\n${avoidNote}\n${isDarija ? '- Add fields "ma" (Marocain variant), "dz2" (Algérien variant), "tn" (Tunisien variant) when they differ significantly\n' : ''}Start directly with [`;

  const response = await fetch('https://api.anthropic.com/v1/messages', {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'anthropic-version': '2023-06-01',
      'anthropic-dangerous-direct-browser-access': 'true'
    },
    body: JSON.stringify({
      model: 'claude-sonnet-4-20250514',
      max_tokens: 8000,
      messages: [{ role: 'user', content: prompt }]
    })
  });

  if (response.status === 429) {
    const retryAfter = parseInt(response.headers.get('retry-after') || '30');
    throw new Error('RATE_LIMIT:' + retryAfter);
  }
  if (!response.ok) throw new Error('API HTTP ' + response.status);

  const data = await response.json();
  const text = (data.content || []).map(b => b.text || '').join('');

  const start = text.indexOf('[');
  if (start === -1) throw new Error('No JSON array in response');

  // Find valid end — handle truncation
  let jsonStr = text.slice(start);
  let parsed;
  try {
    // Try full parse first
    const end = text.lastIndexOf(']');
    parsed = JSON.parse(text.slice(start, end + 1));
  } catch(e) {
    // Truncated — find last complete object
    const lastGood = jsonStr.lastIndexOf('},');
    if (lastGood > 10) {
      try { parsed = JSON.parse(jsonStr.slice(0, lastGood + 1) + ']'); }
      catch(e2) {
        // Try removing last partial object
        const prev = jsonStr.lastIndexOf('},', lastGood - 1);
        if (prev > 10) parsed = JSON.parse(jsonStr.slice(0, prev + 1) + ']');
        else throw new Error('JSON unrecoverable');
      }
    } else throw new Error('JSON too short to recover');
  }
  if (!Array.isArray(parsed) || parsed.length === 0) throw new Error('Empty array');
  return parsed;
}

// ── Main function: load more vocab ──
// ── Smart batch: stay at current level until 80% mastered (beginner langs) ──
function getSmartBatchNum(langId, currentVocab) {
  const raw = Math.floor(currentVocab.length / 150);
  if (raw <= 1) return raw;
  const BEGINNER = ['ar_lb','ar_sa','ar_ae','he','fa','dz','zh','ja'];
  if (!BEGINNER.includes(langId)) return raw;
  // Level bands: which raw batches correspond to which CEFR level
  const bands = [{lvl:'A1',min:0,max:1},{lvl:'A2',min:2,max:3},{lvl:'B1',min:4,max:5},{lvl:'B2',min:6,max:7},{lvl:'C1',min:8,max:9},{lvl:'C2',min:10,max:999}];
  const band = bands.find(b => raw >= b.min && raw <= b.max) || bands[bands.length-1];
  // Count mastery at current level
  const lvlWords = currentVocab.filter(w => w.lvl === band.lvl);
  if (lvlWords.length >= 30) {
    const mastered = lvlWords.filter((w) => {
      const idx = currentVocab.indexOf(w);
      const cs = (state.cards && state.cards[langId + '_' + idx]) || {};
      return (cs.mastery || 0) >= 4;
    }).length;
    if (mastered / lvlWords.length < 0.80) {
      // Stay in current band — alternate between band's two batches
      return band.min + (raw % 2);
    }
  }
  return raw;
}

async function loadMoreVocab(id) {
  if (VOCAB_LOADING[id]) return;
  VOCAB_LOADING[id] = true;

  const langName = LANG_NAMES[id] || id;
  const current = VOCAB[id] || [];
  const batchNum = getSmartBatchNum(id, current);

  showVocabLoadingToast(langName, current.length, batchNum);

  // Retry up to 4 times with backoff on rate limit
  const MAX_RETRIES = 4;
  let newWords, lastErr;
  for (let attempt = 0; attempt < MAX_RETRIES; attempt++) {
    try {
      newWords = await generateVocabBatch(id, batchNum);
      break; // success
    } catch(err) {
      lastErr = err;
      if (err.message && err.message.startsWith('RATE_LIMIT:')) {
        const wait = parseInt(err.message.split(':')[1]) * 1000 || 30000;
        const waitSec = Math.round(wait/1000);
        showVocabLoadingToast(langName, current.length, batchNum, `⏳ Rate limit — attente ${waitSec}s (essai ${attempt+1}/${MAX_RETRIES})…`);
        await new Promise(r => setTimeout(r, wait + 2000));
      } else if (attempt < MAX_RETRIES - 1) {
        const wait = (attempt + 1) * 5000; // 5s, 10s, 15s
        showVocabLoadingToast(langName, current.length, batchNum, `⚠️ Erreur, réessai dans ${wait/1000}s…`);
        await new Promise(r => setTimeout(r, wait));
      } else {
        break; // give up after max retries
      }
    }
  }

  try {
    if (!newWords) throw lastErr || new Error('All retries failed');
    if (!VOCAB[id]) VOCAB[id] = [];
    // Deduplicate
    const existingWords = new Set(VOCAB[id].map(w => w.w.toLowerCase()));
    const unique = newWords.filter(w => !existingWords.has(w.w.toLowerCase()));
    VOCAB[id] = [...VOCAB[id], ...unique];

    saveVocabToStorage(id);
    hideVocabLoadingToast();
    showVocabSuccessToast(langName, VOCAB[id].length, unique.length);
    renderLangSidebar(); if (state.currentSection === 'overview' || state.currentSection === 'vocab') showSection(state.currentSection); else renderLangSidebar();
  } catch(e) {
    console.error('Vocab load error:', e);
    hideVocabLoadingToast();
    showVocabErrorToast(langName, e.message);
    // Fallback to basic vocab if nothing loaded
    if (!VOCAB[id] || VOCAB[id].length === 0) {
      VOCAB[id] = generateBasicVocab(id);
    }
  }
  VOCAB_LOADING[id] = false;
}

// ── Auto-load if vocab is missing for current lang ──
async function ensureVocab(id) {
  if (!VOCAB[id] || VOCAB[id].length <= 30) {
    try {
      const raw = localStorage.getItem('lingua_vocab_' + id);
      if (raw) {
        const words = JSON.parse(raw);
        if (Array.isArray(words) && words.length > 30) {
          VOCAB[id] = words;
          return;
        }
      }
    } catch(e) {}
    await loadMoreVocab(id);
  }
}

function showVocabLoadingToast(langName, current, batch, customMsg) {
  let t = document.getElementById('vocab-toast');
  if (!t) {
    t = document.createElement('div');
    t.id = 'vocab-toast';

  t.style.cssText = `position:fixed;bottom:90px;left:50%;transform:translateX(-50%);

// STATE
// ═══════════════════════════════════════
let state = {
  currentLang: 'en',
  xp: 0,
  level: 1,
  streak: 0,
  lastStudied: null,
  cards: {}, // id -> {mastery:0-5, nextReview: timestamp, reviewCount}
  gameScore: 0,
  currentScreen: 'home',
  currentSection: 'overview',
  aiHistory: [],
  lessonsDone: {},
  learnDone: {},
  grammarCache: {},
  darkMode: false,
  langStreaks: {},
  activityLog: {},  // 'YYYY-MM-DD' -> {reviews:n, xp:n}
  masteryHistory: [], // [{date, lang, mastered}]
  wordMistakes: {}, // 'langId_idx' -> count
};

// ── SM-2 Spaced Repetition (science-based) ──────────────────
// Each card has: interval (days), easeFactor (2.5 default), step (learning phase)
// Learning steps: 1min → 10min → 1day → then SM-2 intervals
const SM2_LEARNING_STEPS = [1, 10]; // minutes
const SM2_DEFAULT_EASE = 2.5;
const SM2_MIN_EASE = 1.3;
const MS = { MIN: 60000, DAY: 86400000 };

function sm2Next(cs, quality) {
  // quality: 0=again, 1=hard, 2=good, 3=easy
  const now = Date.now();
  let { interval=0, easeFactor=SM2_DEFAULT_EASE, step=0, lapses=0 } = cs;

  if (quality === 0) {
    // Again — back to first learning step
    lapses = (lapses||0) + 1;
    step = 0;
    interval = 0;
    easeFactor = Math.max(SM2_MIN_EASE, easeFactor - 0.2);
    return { nextReview: now + SM2_LEARNING_STEPS[0] * MS.MIN, interval, easeFactor, step, lapses };
  }

  if (interval === 0) {
    // Still in learning phase (steps)
    if (quality === 3) {
      // Easy — skip straight to review with 4-day interval
      interval = 4;
      step = 99;
      return { nextReview: now + interval * MS.DAY, interval, easeFactor, step, lapses };
    }
    // Advance to next step
    const nextStep = Math.min(step + 1, SM2_LEARNING_STEPS.length - 1);
    if (step >= SM2_LEARNING_STEPS.length - 1) {
      // Graduated — first review interval
      interval = quality === 1 ? 1 : 1; // 1 day
      step = 99; // graduated
    } else {
      step = nextStep;
      return { nextReview: now + SM2_LEARNING_STEPS[nextStep] * MS.MIN, interval, easeFactor, step, lapses };
    }
    return { nextReview: now + interval * MS.DAY, interval, easeFactor, step, lapses };
  }

  // Review phase — SM-2 algorithm
  if (quality === 1) {
    // Hard — same interval × 1.2, ease -0.15
    interval = Math.max(1, Math.round(interval * 1.2));
    easeFactor = Math.max(SM2_MIN_EASE, easeFactor - 0.15);
  } else if (quality === 2) {
    // Good — interval × easeFactor
    interval = Math.max(1, Math.round(interval * easeFactor));
  } else if (quality === 3) {
    // Easy — interval × easeFactor × 1.3, ease +0.15
    interval = Math.max(1, Math.round(interval * easeFactor * 1.3));
    easeFactor = Math.min(4.0, easeFactor + 0.15);
  }

  return { nextReview: now + interval * MS.DAY, interval, easeFactor, step, lapses };
}

// Mastery level from interval (for display stars)
function intervalToMastery(interval) {
  if (interval <= 0)  return 0;
  if (interval < 4)   return 1;
  if (interval < 14)  return 2;
  if (interval < 60)  return 3;
  if (interval < 180) return 4;
  return 5;
}

function getCardId(langId, wordIdx) { return `${langId}_${wordIdx}`; }

function getCardState(langId, idx) {
  const id = getCardId(langId, idx);
  if (!state.cards[id]) {
    // New unseen word: set nextReview to far future so it doesn't flood queue
    // It will be introduced via getNewCards() instead
    state.cards[id] = {mastery:0, nextReview: Date.now() + 999 * 86400000, reviewCount:0, isNew:true};
  }
  return state.cards[id];
}

function getDueCards(langId) {
  const vocab = VOCAB[langId] || [];
  const now = Date.now();
  return vocab.map((w,i) => ({word:w, idx:i, cs:getCardState(langId,i)}))
    .filter(c => !c.cs.isNew && c.cs.nextReview <= now)
    .sort((a,b) => a.cs.nextReview - b.cs.nextReview);
}

// New unseen words to introduce today (max 20 per day)
function getNewCards(langId, max=20) {
  const vocab = VOCAB[langId] || [];
  const today = new Date().toISOString().split('T')[0];
  // Count how many new words already introduced today
  const introducedToday = Object.entries(state.cards)
    .filter(([k,v]) => k.startsWith(langId+'_') && v.introducedDate === today).length;
  const remaining = Math.max(0, max - introducedToday);
  if (remaining === 0) return [];
  return vocab.map((w,i) => ({word:w, idx:i, cs:getCardState(langId,i)}))
    .filter(c => c.cs.isNew)
    .slice(0, remaining);
}

function reviewCard(langId, idx, quality) {
  // quality: 0=again, 1=hard, 2=good, 3=easy
  const cs = getCardState(langId, idx);
  const today = new Date().toISOString().split('T')[0];
  if (cs.isNew) { cs.isNew = false; cs.introducedDate = today; }

  // SM-2 calculation
  const sm2 = sm2Next(cs, quality);
  cs.nextReview  = sm2.nextReview;
  cs.interval    = sm2.interval;
  cs.easeFactor  = sm2.easeFactor;
  cs.step        = sm2.step;
  cs.lapses      = sm2.lapses;
  cs.mastery     = intervalToMastery(sm2.interval);
  cs.reviewCount = (cs.reviewCount||0) + 1;

  // Track mistakes
  if (quality === 0) {
    const mk = langId+'_'+idx;
    state.wordMistakes[mk] = (state.wordMistakes[mk] || 0) + 1;
  }
  // Track mastery history snapshot
  const today2 = new Date().toISOString().split('T')[0];
  const allMastered = (VOCAB[langId]||[]).filter((_,i2) => ((state.cards[langId+'_'+i2])||{}).mastery>=4).length;
  const lastSnap = state.masteryHistory[state.masteryHistory.length-1];
  if (!lastSnap || lastSnap.date !== today2 || lastSnap.lang !== langId) {
    state.masteryHistory.push({date:today2, lang:langId, mastered:allMastered});
    if (state.masteryHistory.length > 365) state.masteryHistory.shift();
  }
  const xpGain = quality === 0 ? 2 : quality === 1 ? 5 : quality === 2 ? 10 : 15;
  addXP(xpGain);
  saveState();
  return xpGain;
}

function addXP(amount) {
  state.xp += amount;
  const xpPerLevel = 200;
  const newLevel = Math.floor(state.xp / xpPerLevel) + 1;
  if (newLevel > state.level) {
    state.level = newLevel;
    showXPPopup(`🎉 Niveau ${newLevel} !`);
  } else {
    showXPPopup(`+${amount} XP`);
  }
  updateStreak();
  updateHeader();
}

function updateStreak() {
  const today = new Date().toDateString();
  const todayISO = new Date().toISOString().split('T')[0];
  if (!state.activityLog[todayISO]) state.activityLog[todayISO] = {reviews:0, xp:0};
  state.activityLog[todayISO].reviews++;
  if (state.lastStudied !== today) {
    const yesterday = new Date(Date.now() - 86400000).toDateString();
    if (state.lastStudied === yesterday) { state.streak++; }
    else if (state.lastStudied !== today) { state.streak = 1; }
    state.lastStudied = today;
  }
  // Per-lang streak
  const lang = state.currentLang;
  if (!state.langStreaks[lang]) state.langStreaks[lang] = {streak:0, lastStudied:null};
  const ls = state.langStreaks[lang];
  if (ls.lastStudied !== today) {
    const yest = new Date(Date.now()-86400000).toDateString();
    ls.streak = ls.lastStudied === yest ? ls.streak + 1 : 1;
    ls.lastStudied = today;
  }
}

function saveState() {
  try {
    const s = {...state, lastSaved: new Date().toISOString()};
    localStorage.setItem('lingua_state', JSON.stringify(s));
  } catch(e) {}
  try { if (typeof fbSaveToCloud === 'function' && typeof fbInitialized !== 'undefined' && fbInitialized) fbSaveToCloud(); } catch(e) {}
}
function migrateCards() {
  // Cards already reviewed (reviewCount > 0) should NOT be isNew
  // Cards never reviewed with nextReview = far future = already migrated
  // Cards with old nextReview <= now and reviewCount = 0 = were created before fix
  // → mark them as properly new (push nextReview to far future)
  if (!state._cardsMigrated) {
    const farFuture = Date.now() + 999 * 86400000;
    Object.entries(state.cards || {}).forEach(([k, cs]) => {
      if (cs.reviewCount === 0 && cs.isNew === undefined) {
        cs.isNew = true;
        cs.nextReview = farFuture;
      }
    });
    state._cardsMigrated = true;
    saveState();
  }
}

function loadState() {
  try {
    const s = localStorage.getItem('lingua_state');
    if (s) state = {...state, ...JSON.parse(s)};
    if (state.darkMode) {
      document.body.classList.add('dark-mode');
      setTimeout(()=>{ const b=document.getElementById('dark-toggle'); if(b) b.textContent='☀️'; }, 100);
    }
  } catch(e){}
}

function getBatchLevel(batchNum, langId) {
  langId = langId || state.currentLang;
  const BEGINNER_LANGS = ['ar_lb','ar_sa','ar_ae','he','fa','dz','zh','ja'];
  const ADVANCED_LANGS = ['es','it','pt','en','de','pl','nl','ru','cs','tr'];
  if (batchNum <= 1) return 'A1';
  if (BEGINNER_LANGS.includes(langId)) {
    if (batchNum <= 3) return 'A2';
    if (batchNum <= 5) return 'B1';
    if (batchNum <= 7) return 'B2';
    if (batchNum <= 9) return 'C1';
    return 'C2';
  }
  if (ADVANCED_LANGS.includes(langId)) {
    if (batchNum <= 3) return 'A2';
    if (batchNum <= 5) return 'B1';
    if (batchNum <= 7) return 'B1→B2';
    if (batchNum <= 9) return 'B2';
    return 'B2→C2';
  }
  const levels = ['A1','A1','A2','A2','B1','B1','B2','B2','C1','C2'];
  return levels[batchNum % levels.length] || 'A1';
}

// ── Bulk load all languages ──
let bulkLoadActive = false;
async function bulkLoadAllVocab() {
  if (bulkLoadActive) return;
  bulkLoadActive = true;
  const btn = document.getElementById('bulk-load-btn');
  if (btn) btn.disabled = true;

  const langs = LANGS.filter(l => !VOCAB_LOADING[l.id]);
  let i = 0;
  for (const l of langs) {
    if (VOCAB_LOADING[l.id]) continue;
    i++;
    if (btn) btn.textContent = `⚡ Chargement ${i}/${langs.length} — ${l.flag} ${l.name}…`;
    await loadMoreVocab(l.id);
    renderLangSidebar();
    if (i < langs.length) {
      // Wait 8s between languages to respect rate limits
      const btn2 = document.getElementById('bulk-load-btn');
      for (let s = 8; s > 0; s--) {
        if (btn2) btn2.textContent = `⏳ Pause anti-limite ${s}s… (${i}/${langs.length} langues)`;
        await new Promise(r => setTimeout(r, 1000));
      }
    }
  }
  bulkLoadActive = false;
  renderLangSidebar();
  if (btn) { btn.disabled = false; btn.textContent = '⚡ Tout charger (+150 mots / langue)'; }
}

function flipLearnNew() {
  const card = document.getElementById('ln-card');
  if (!card || card.classList.contains('flipped')) return;
  card.classList.add('flipped');
  document.getElementById('ln-btns').style.display = 'block';
  document.getElementById('ln-hint').style.display  = 'none';
  const item = learnNewQueue[learnNewIdx];
  if (item) speakWord(item.word.w, state.currentLang);
}

function learnNewAnswer(known) {
  const item = learnNewQueue[learnNewIdx];
  if (known) {
    // Marquer comme appris avec intervalle 1 jour (pas les learning steps)
    const cs = getCardState(state.currentLang, item.idx);
    const today = new Date().toISOString().split('T')[0];
    cs.isNew = false;
    cs.introducedDate = today;
    cs.interval = 1;
    cs.easeFactor = 2.5;
    cs.step = 99; // graduated
    cs.nextReview = Date.now() + 86400000; // 1 jour
    cs.reviewCount = (cs.reviewCount||0) + 1;
    cs.mastery = 1;
    saveState();
    learnNewIdx++;
  } else {
    learnNewQueue.push(learnNewQueue.splice(learnNewIdx, 1)[0]);
  }
  renderLangSidebar();
  renderLearnNewCard();
}

function renderSRS() {
  const lang = LANGS.find(l => l.id === state.currentLang);
  if (!lang) {
    document.getElementById('screen-content').innerHTML = `<div style="text-align:center;padding:40px;color:var(--muted)">Sélectionne une langue d\'abord !<br><br><button class="btn-primary" onclick="openLangModal()">Choisir une langue</button></div>`;
    return;
  }

  srsCurrentIdx = 0;
  srsFlipped = false;
  srsSessionStats = {reviewed:0, correct:0};

  // Apply deck filter if coming from a specific deck
  const deckFilter = state._srsFilter;
  if (deckFilter) {
    delete state._srsFilter;
    const def = DECK_DEFS && DECK_DEFS.find(d => d.id === deckFilter);
    if (def) {
      const vocab = VOCAB[state.currentLang] || [];
      const deckWords = vocab.map((w,i)=>({word:w,idx:i,cs:getCardState(state.currentLang,i)}))
        .filter(item => { const d = getDeckForWord(item.word); return d && d.id === deckFilter; });
      const due = deckWords.filter(item => !item.cs.isNew && item.cs.nextReview <= Date.now());
      const newCards = deckWords.filter(item => item.cs.isNew).slice(0, 10);
      srsQueue = shuffle([...due, ...newCards]);
    }
  } else {
    const due = getDueCards(state.currentLang);
    const newCards = getNewCards(state.currentLang, 20);
    srsQueue = shuffle([...due, ...newCards]);
  }

  if (srsQueue.length === 0) {
    const nextCard = (VOCAB[state.currentLang]||[])
      .map((w,i) => getCardState(state.currentLang,i))
      .filter(cs => !cs.isNew)
      .sort((a,b) => a.nextReview - b.nextReview)[0];
    const nextTime = nextCard ? (() => {
      const ms = nextCard.nextReview - Date.now();
      if (ms < 3600000) return `dans ${Math.ceil(ms/60000)} min`;
      if (ms < 86400000) return `dans ${Math.ceil(ms/3600000)}h`;
      return `dans ${Math.ceil(ms/86400000)} jour(s)`;
    })() : null;
    const newLeft = getNewCards(state.currentLang, 999).length;
    document.getElementById('screen-content').innerHTML = `
      <div style="text-align:center;padding:50px 20px">
        <div style="font-size:4rem;margin-bottom:16px">🎉</div>
        <div style="font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:1px;margin-bottom:8px">Tout est révisé !</div>
        <div style="color:var(--muted);font-size:.9rem;margin-bottom:24px">
          ${nextTime ? `Prochaine révision <strong>${nextTime}</strong>.` : 'Rien à réviser pour l\'instant.'}
        </div>
        ${newLeft > 0 ? `
        <div style="background:var(--card);border:1px solid var(--border);border-radius:18px;padding:20px;margin-bottom:20px;text-align:left">
          <div style="font-weight:800;font-size:1rem;margin-bottom:6px">📥 ${newLeft} nouveaux mots à apprendre</div>
          <div style="color:var(--muted);font-size:.82rem;margin-bottom:12px">Apprends-les maintenant pour qu'ils entrent dans ta révision espacée.</div>
          <button class="btn-primary" style="width:100%" onclick="startLearnNew()">▶ Apprendre les nouveaux mots</button>
        </div>` : ''}
        <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
          <button class="btn-primary" style="background:var(--bg3);color:var(--text);border:1px solid var(--border)" onclick="showSection('collection')">📚 Collection</button>
          <button class="btn-primary" style="background:var(--bg3);color:var(--text);border:1px solid var(--border)" onclick="showSection('games')">🎮 Jeux</button>
        </div>
      </div>`;
    return;
  }
  renderSRSCard();
}


function getSRSHint(cs, quality) {
  const next = sm2Next(cs, quality);
  const ms = next.nextReview - Date.now();
  if (ms < 60000)      return '< 1 min';
  if (ms < 3600000)    return Math.round(ms/60000) + ' min';
  if (ms < 86400000)   return Math.round(ms/3600000) + 'h';
  if (ms < 604800000)  return Math.round(ms/86400000) + 'j';
  if (ms < 2592000000) return Math.round(ms/604800000) + ' sem';
  return Math.round(ms/2592000000) + ' mois';
}

function flipCard() {
  if (srsFlipped) return;
  const fc = document.getElementById('fc-main');
  if (!fc) return;
  srsFlipped = true;
  fc.classList.add('flipped');
  document.getElementById('srs-btns').style.display = 'block';
  document.getElementById('swipe-hint').style.display = 'none';
  // Play word when native side appears
  const item = srsQueue[srsCurrentIdx];
  if (item) setTimeout(() => speakWord(item.word.w, state.currentLang), 300);

function rateSRS(quality) {
  const item = srsQueue[srsCurrentIdx];
  reviewCard(state.currentLang, item.idx, quality);
  if (quality >= 2) srsSessionStats.correct++;
  srsSessionStats.reviewed++;
  srsCurrentIdx++;

  renderLangSidebar();
  renderSRSCard();
}

function startGame(type) {
  currentGame = type;
  const vocab = shuffle([...(VOCAB[state.currentLang] || [])]);
  gameState = {
    type, vocab, idx:0, score:0, total:10, streak:0,
    words: vocab.slice(0, 20),
    timer: null, timeLeft: 60,
    matchSelected: null, matchPairs: [], matchMatched: [],
    // Memory game state
    memCards: [], memFlipped: [], memMatched: [], memAttempts: 0,
    // Blind test state
    blindIdx: 0, blindTotal: 10, blindWords: vocab.slice(0,10)
  };
  if (type === 'memory') { renderMemoryGame(); return; }
  if (type === 'blindtest') { renderBlindTest(); return; }
  renderGameUI();
}

function renderGameUI() {
  const gNames = {mcq:'Choix Multiple',match:'Association',fill:'Phrase à trous',listen:'Écoute & Trouve',build:'Construis le mot',speed:'Speed Round'};
  const header = `<div class="game-area">
    <div class="game-header">
      <button class="back-btn" onclick="renderGames()">← Retour</button>
      <div class="game-title-bar">${gNames[currentGame]}</div>
      <div class="game-score-bar">
        <div class="g-score">⭐ ${gameState.score}</div>
        ${currentGame==='speed'?`<div class="g-score" id="g-timer">⏱ ${gameState.timeLeft}s</div>`:''}
      </div>
    </div>
    <div id="game-body"></div>
  </div>`;
  document.getElementById('screen-content').innerHTML = header;
  renderNextQuestion();
}

function renderNextQuestion() {
  if (gameState.idx >= gameState.total && currentGame !== 'match' && currentGame !== 'speed') {
    renderGameResult();
    return;
  }
  const w = gameState.words[gameState.idx % gameState.words.length];
  const lang = LANGS.find(l => l.id === state.currentLang);
  const isRTL = lang && lang.rtl;
  
  if (currentGame === 'mcq') renderMCQ(w, isRTL);
  else if (currentGame === 'fill') renderFill(w, isRTL);
  else if (currentGame === 'listen') renderListen(w, isRTL);
  else if (currentGame === 'build') renderBuild(w);
  else if (currentGame === 'match') renderMatch();
  else if (currentGame === 'speed') renderSpeed();
