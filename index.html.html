const LANG_VOICE_MAP = {
  en:'en-GB', es:'es-ES', it:'it-IT', pt:'pt-BR', de:'de-DE', tr:'tr-TR',
  nl:'nl-NL', pl:'pl-PL', cs:'cs-CZ', ru:'ru-RU', ja:'ja-JP',
  zh:'zh-CN', he:'he-IL',
  ar_lb:'ar-LB', ar_sa:'ar-SA', ar_ae:'ar-AE',
  dz:'ar-MA', dz_ma:'ar-MA', dz_dz:'ar-DZ', dz_tn:'ar-TN',
  fa:'fa-IR',
};

let audioSlow = false; // slow mode toggle

// Find best available voice for a language code
function getBestVoice(langCode) {
  const voices = speechSynthesis.getVoices();
  if (!voices.length) return null;
  // Exact match first
  let v = voices.find(v => v.lang === langCode);
  if (v) return v;
  // Prefix match (e.g. 'fa' matches 'fa-IR')
  const prefix = langCode.split('-')[0];
  v = voices.find(v => v.lang.startsWith(prefix));
  if (v) return v;
  // Fallback chains for languages often missing
  const fallbacks = {
    // Persan → fallback arabe (même script)
    'fa':    ['fa-IR','ar-SA','ar','ar-EG'],
    'fa-IR': ['ar-SA','ar-EG','ar'],
    // Hébreu
    'he':    ['he-IL','ar'],
    'he-IL': ['ar-SA'],
    // Arabe Libanais → Saoudien → Égyptien → générique
    'ar-LB': ['ar-SA','ar-EG','ar','ar-MA'],
    // Arabe Émiratis → Saoudien → générique
    'ar-AE': ['ar-SA','ar-EG','ar'],
    // Darija → arabe maghrébin → arabe standard
    'ar-MA': ['ar-DZ','ar-TN','ar-SA','ar'],
    'ar-DZ': ['ar-MA','ar-TN','ar-SA','ar'],
    'ar-TN': ['ar-MA','ar-DZ','ar-SA','ar'],
    // Générique arabe
    'ar':    ['ar-SA','ar-EG','ar-MA'],
    // Slaves sans voix native
    'cs':    ['cs-CZ','sk-SK','pl-PL'],
    'cs-CZ': ['sk-SK','pl-PL','cs'],
    'pl':    ['pl-PL','cs-CZ','sk-SK'],
    'sk':    ['sk-SK','cs-CZ','pl-PL'],
    'ru':    ['ru-RU','uk-UA'],
    // Langues asiatiques
    'zh-CN': ['zh-TW','zh'],
    'zh':    ['zh-CN','zh-TW'],
    'ja':    ['ja-JP'],
    // Néerlandais
    'nl':    ['nl-NL','nl-BE'],
    // Portugais
    'pt-BR': ['pt-PT','pt'],
    'pt':    ['pt-BR','pt-PT'],
  };
  const chain = fallbacks[langCode] || fallbacks[prefix] || [];
  for (const fb of chain) {
    v = voices.find(v => v.lang === fb || v.lang.startsWith(fb.split('-')[0]));
    if (v) return v;
  }
  return null;
}

function speakWord(word, langId, slow) {
  if (!window.speechSynthesis) return;
  document.querySelectorAll('.play-audio-btn').forEach(b => {
    b.classList.add('playing');
    setTimeout(() => b.classList.remove('playing'), 1800);
  });

  const targetLang = LANG_VOICE_MAP[langId] || 'en-US';
  const rate = (slow || audioSlow) ? 0.55 : 0.85;

  function doSpeak() {
    const utter = new SpeechSynthesisUtterance(word);
    utter.lang = targetLang;
    utter.rate = rate;
    const voices = speechSynthesis.getVoices();
    if (voices.length > 0) {
      const best = getBestVoice(targetLang);
      if (best) utter.voice = best;
    }
    utter.onerror = () => {
      // Last resort: no explicit voice, just set lang and let browser handle it
      const fb = new SpeechSynthesisUtterance(word);
      fb.lang = targetLang;
      fb.rate = rate;
      speechSynthesis.cancel();
      speechSynthesis.speak(fb);
    };
    speechSynthesis.cancel();
    speechSynthesis.speak(utter);
  }

  // Voices may not be loaded yet — wait for them if needed
  const voices = speechSynthesis.getVoices();
  if (voices.length === 0) {
    speechSynthesis.onvoiceschanged = () => { speechSynthesis.onvoiceschanged = null; doSpeak(); };
    // Also try immediately after a short delay (some browsers don't fire onvoiceschanged)
    setTimeout(doSpeak, 300);
  } else {
    doSpeak();
  }
}

}

function addBuildLetter(idx, letter) {
  const bl = document.getElementById('bl'+idx);
  if (bl.classList.contains('used')) return;
  bl.classList.add('used');
  gameState.buildAnswer.push({idx, letter});
  
  const answerDiv = document.getElementById('build-answer');
  const slot = document.createElement('div');
  slot.className = 'wbuild-slot';
  slot.textContent = letter;
  slot.dataset.idx = gameState.buildAnswer.length - 1;
  slot.onclick = () => removeBuildLetter(parseInt(slot.dataset.idx), idx);
  answerDiv.appendChild(slot);
  
  // Check if complete
  const current = gameState.buildAnswer.map(a=>a.letter).join('');
  if (current.length === gameState.buildTarget.length) {
    setTimeout(() => {
      if (current === gameState.buildTarget) {
        gameState.score++;
        addXP(20);
        slot.style.borderColor = 'var(--green)';
        document.querySelectorAll('.wbuild-slot').forEach(s=>s.style.borderColor='var(--green)');
        gameState.idx++;
        setTimeout(renderNextQuestion, 800);
      } else {
        document.querySelectorAll('.wbuild-slot').forEach(s=>s.style.borderColor='var(--accent2)');
        setTimeout(clearBuild, 600);
      }
    }, 100);
  }
}

function removeBuildLetter(ansIdx, letterIdx) {
  document.getElementById('bl'+gameState.buildAnswer[ansIdx].letterIdx)?.classList.remove('used');
  gameState.buildAnswer.splice(ansIdx, 1);
  renderBuildAnswer();
}

  gameState.buildAnswer = [];

function renderMatch() {
  const pairs = gameState.words.slice(0, 6);
  const leftItems = pairs.map((w,i)=>({id:'L'+i, text:w.w, pairId:i, side:'left'}));
  const rightItems = shuffle(pairs.map((w,i)=>({id:'R'+i, text:w.fr, pairId:i, side:'right'})));
  gameState.matchPairs = [...leftItems, ...rightItems];
  gameState.matchMatched = [];
  gameState.matchSelected = null;
  gameState.matchScore = 0;
  
  const leftHTML = leftItems.map(item=>`<div class="match-item" id="mi-${item.id}" data-id="${item.id}" data-pair="${item.pairId}" data-side="${item.side}" onclick="selectMatchItem('${item.id}')">${item.text}</div>`).join('');
  const rightHTML = rightItems.map(item=>`<div class="match-item" id="mi-${item.id}" data-id="${item.id}" data-pair="${item.pairId}" data-side="${item.side}" onclick="selectMatchItem('${item.id}')">${item.text}</div>`).join('');
  
  document.getElementById('game-body').innerHTML = `
    <div style="text-align:center;color:var(--muted);font-size:.82rem;margin-bottom:12px">Relie chaque mot à sa traduction</div>
    <div class="match-grid">
      <div style="display:flex;flex-direction:column;gap:8px">${leftHTML}</div>
      <div style="display:flex;flex-direction:column;gap:8px">${rightHTML}</div>
    </div>
    <div style="text-align:center;margin-top:12px;font-size:.85rem">Paires : <span id="match-count">0</span> / ${pairs.length}</div>`;
}

function selectMatchItem(id) {
  const item = gameState.matchPairs.find(p=>p.id===id);
  if (!item || gameState.matchMatched.includes(item.pairId)) return;
  
  if (!gameState.matchSelected) {
    gameState.matchSelected = item;
    document.getElementById('mi-'+id).classList.add('selected');
  } else {
    const prev = gameState.matchSelected;
    document.getElementById('mi-'+prev.id).classList.remove('selected');
    
    if (prev.pairId === item.pairId && prev.side !== item.side) {
      // Correct!
      document.getElementById('mi-'+prev.id).classList.add('matched');
      document.getElementById('mi-'+id).classList.add('matched');
      gameState.matchMatched.push(item.pairId);
      gameState.matchScore++;
      addXP(15);
      document.getElementById('match-count').textContent = gameState.matchMatched.length;
      
      if (gameState.matchMatched.length === 6) {
        gameState.score = gameState.matchScore;
        gameState.total = 6;
        setTimeout(renderGameResult, 800);
      }
    } else {
      // Wrong
      document.getElementById('mi-'+id).classList.add('wrong-match');
      setTimeout(()=>document.getElementById('mi-'+id)?.classList.remove('wrong-match'),400);
    }
    gameState.matchSelected = null;
  }
}

// MEMORY GAME

function renderMemoryGame() {
  const vocab = shuffle([...(VOCAB[state.currentLang]||[])]).slice(0,8);
  const lang = LANGS.find(l=>l.id===state.currentLang);
  // Create pairs: each word appears as native card + translation card
  let cards = [];
  vocab.forEach((w,i)=>{
    cards.push({id:'w'+i, pairId:i, text:w.w, type:'word', rtl:lang&&lang.rtl});
    cards.push({id:'t'+i, pairId:i, text:w.fr, type:'trans', rtl:false});
  });
  cards = shuffle(cards);
  gameState.memCards = cards;
  gameState.memFlipped = [];
  gameState.memMatched = [];
  gameState.memAttempts = 0;
  gameState.score = 0;

  const sc = document.getElementById('screen-content');
  sc.innerHTML = `<div class="game-area">
    <div class="game-header">
      <button class="back-btn" onclick="renderGames()">← Retour</button>
      <div class="game-title-bar">🃏 Mémoire</div>
      <div class="game-score-bar">
        <div class="g-score" id="mem-pairs">🎯 0/${vocab.length}</div>
        <div class="g-score" id="mem-attempts">🔄 0</div>
      </div>
    </div>
    <div id="mem-grid" style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-top:8px"></div>
  </div>`;
  renderMemGrid();
}

function renderMemGrid() {
  const grid = document.getElementById('mem-grid');
  if (!grid) return;
  grid.innerHTML = gameState.memCards.map(c=>{
    const isFlipped = gameState.memFlipped.includes(c.id) || gameState.memMatched.includes(c.pairId);
    const isMatched = gameState.memMatched.includes(c.pairId);
    return `<div onclick="memFlip('${c.id}')"
      style="height:64px;border-radius:12px;cursor:pointer;display:flex;align-items:center;justify-content:center;text-align:center;font-size:${c.type==='word'?.82:.78}rem;font-weight:700;padding:4px;
      background:${isMatched?'rgba(34,197,94,.15)':isFlipped?'var(--bg2)':'var(--accent)'};
      color:${isMatched?'#16a34a':isFlipped?'var(--text)':'white'};
      border:2px solid ${isMatched?'#22c55e':isFlipped?'var(--border)':'transparent'};
      transition:all .2s;direction:${c.rtl&&isFlipped?'rtl':'ltr'}">
      ${isFlipped||isMatched ? c.text : '?'}
    </div>`;
  }).join('');
}

function memFlip(cardId) {
  const c = gameState.memCards.find(x=>x.id===cardId);
  if (!c || gameState.memMatched.includes(c.pairId) || gameState.memFlipped.includes(cardId)) return;
  if (gameState.memFlipped.length >= 2) return;
  gameState.memFlipped.push(cardId);
  renderMemGrid();
  if (gameState.memFlipped.length === 2) {
    gameState.memAttempts++;
    document.getElementById('mem-attempts').textContent = '🔄 ' + gameState.memAttempts;
    const [id1, id2] = gameState.memFlipped;
    const c1 = gameState.memCards.find(x=>x.id===id1);
    const c2 = gameState.memCards.find(x=>x.id===id2);
    if (c1.pairId === c2.pairId) {
      // Match!
      gameState.memMatched.push(c1.pairId);
      gameState.memFlipped = [];
      gameState.score++;
      document.getElementById('mem-pairs').textContent = '🎯 ' + gameState.memMatched.length + '/' + (gameState.memCards.length/2);
      setTimeout(renderMemGrid, 200);
      if (gameState.memMatched.length === gameState.memCards.length/2) {
        setTimeout(()=>{
          addXP(gameState.score * 12);
          const sc = document.getElementById('screen-content');
          sc.innerHTML = `<div class="result-area">
            <div class="result-emoji">🎉</div>
            <div class="result-title">Toutes les paires trouvées !</div>
            <div class="result-sub">${gameState.memAttempts} tentatives</div>
            <div style="display:flex;gap:10px;justify-content:center;margin-top:16px">
              <button class="btn-primary" onclick="startGame('memory')">🔄 Rejouer</button>
              <button class="btn-secondary" onclick="renderGames()">← Jeux</button>
            </div>
          </div>`;
        }, 400);
      }
    } else {
      setTimeout(()=>{ gameState.memFlipped=[]; renderMemGrid(); }, 900);
    }
  }
}

        <div class="g-score">⭐ ${gameState.score}</div>
        <div class="g-score">${gameState.blindIdx+1}/${gameState.blindWords.length}</div>
      </div>
    </div>
    <div style="text-align:center;padding:32px 16px">
      <div style="font-size:.8rem;color:var(--muted);margin-bottom:16px">Écoute le mot et trouve sa traduction</div>
      <button onclick="speakWord('${w.w.replace(/'/g,"\'")}','${state.currentLang}')" 
        style="background:linear-gradient(135deg,var(--accent),var(--accent2));border:none;border-radius:50%;width:80px;height:80px;font-size:2rem;cursor:pointer;color:white;box-shadow:0 8px 24px rgba(108,71,255,.4)">🔊</button>
      <div style="font-size:.72rem;color:var(--muted);margin-top:8px">Appuie pour écouter</div>
      ${lang&&lang.romanize&&w.p?`<div style="font-size:.75rem;color:var(--accent);margin-top:6px;font-style:italic">${w.p}</div>`:''}
    </div>
    <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 4px">
      ${choices.map((ch,i)=>`<button class="blind-choice" data-chosen="${ch.replace(/"/g,'&quot;')}" data-correct="${w.fr.replace(/"/g,'&quot;')}" onclick="blindAnswer(this)"
        style="padding:14px 10px;border-radius:14px;border:2px solid var(--border);background:var(--bg2);color:var(--text);font-family:'Nunito',sans-serif;font-size:.85rem;font-weight:700;cursor:pointer;transition:all .2s">
        ${ch}
      </button>`).join('')}
    </div>
  </div>`;
  // Auto-play after short delay
  setTimeout(()=>speakWord(w.w, state.currentLang), 400);
}

function blindAnswer(btn) {
  const chosen = btn.dataset.chosen;
  const correct = btn.dataset.correct;
  const btns = document.querySelectorAll('.blind-choice');
  btns.forEach(b => {
    const isCorrect = b.dataset.chosen === correct;
    const isChosen = b === btn;
    b.style.background = isCorrect ? 'rgba(34,197,94,.2)' : (isChosen && !isCorrect) ? 'rgba(239,68,68,.2)' : 'var(--bg2)';
    b.style.borderColor = isCorrect ? '#22c55e' : (isChosen && !isCorrect) ? '#ef4444' : 'var(--border)';
    b.disabled = true;
  });
  if (chosen === correct) gameState.score++;
  gameState.blindIdx++;
  setTimeout(renderBlindQuestion, 1100);
}


function renderGameResult() {
  if (gameState.timer) clearInterval(gameState.timer);
  const pct = gameState.total > 0 ? Math.round((gameState.score/gameState.total)*100) : 0;
  const isSpeed = currentGame === 'speed';
  
  document.getElementById('game-body').innerHTML = `
    <div class="result-card">
      <span class="result-emoji">${pct>=80||gameState.score>=15?'🏆':gameState.score>=8?'👍':'📚'}</span>
      <div class="result-title">Bravo !</div>
      <div class="result-score">${isSpeed ? gameState.score+' pts' : pct+'%'}</div>
      <div class="result-sub">${isSpeed ? `${gameState.score} bonnes réponses en 60 secondes !` : `${gameState.score} / ${gameState.total} bonnes réponses`}</div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn-primary" onclick="startGame('${currentGame}')">🔄 Rejouer</button>
        <button class="btn-primary" style="background:var(--bg3);color:var(--text);border:1px solid var(--border)" onclick="renderGames()">← Jeux</button>
      </div>
    </div>`;
}

// Get units for a language
function getLearnUnits(langId) {
  return LEARN_UNITS[langId] || LEARN_UNITS.default;
}

// Check if a lesson is completed
function isLearnLessonDone(lessonId) {
  return !!(state.learnDone && state.learnDone[lessonId]);
}

// Check if a unit is completed
function isUnitDone(unit) {
  return unit.lessons.every(l => isLearnLessonDone(l.id));
}

// Check if a unit is unlocked (first unit always unlocked, rest need prev done)
function isUnitUnlocked(units, unitIdx) {
  if (unitIdx === 0) return true;
  return isUnitDone(units[unitIdx - 1]);
}

let alphabetMode = 'hebrew';

function renderLearn() {
  if (!state.learnDone) state.learnDone = {};
  const lang = LANGS.find(l => l.id === state.currentLang);
  const units = getLearnUnits(state.currentLang);
  const totalLessons = units.reduce((s, u) => s + u.lessons.length, 0);
  const doneLessons = units.reduce((s, u) => s + u.lessons.filter(l => isLearnLessonDone(l.id)).length, 0);

  const unitsHTML = units.map((unit, ui) => {
    const unlocked = isUnitUnlocked(units, ui);
    const done = isUnitDone(unit);
    const statusClass = done ? 'completed' : unlocked ? 'unlocked' : 'locked';
    const isOpen = learnOpenUnit === unit.id;
    const doneCnt = unit.lessons.filter(l => isLearnLessonDone(l.id)).length;
    const levelColor = LEVEL_COLORS[unit.level] || '#94a3b8';

    const lessonsHTML = isOpen ? unit.lessons.map((lesson, li) => {
      const lessonDone = isLearnLessonDone(lesson.id);
      const lessonUnlocked = unlocked && (li === 0 || isLearnLessonDone(unit.lessons[li-1].id));
      const lockedClass = !lessonUnlocked ? 'locked' : lessonDone ? 'done' : '';
      const typeLabel = {guided:'Leçon guidée', fill:'Remplissage', listen:'Écoute', dialogue:'Dialogue'}[lesson.type] || lesson.type;
      return `<div class="learn-lesson-item ${lockedClass}" onclick="${lessonUnlocked ? `startLearnLesson('${lesson.id}','${unit.id}')` : ''}">
        <span class="lli-icon">${lessonDone ? '✅' : !lessonUnlocked ? '🔒' : lesson.icon}</span>
        <div class="lli-info">
          <div class="lli-title">${lesson.title}</div>
          <div class="lli-type">${typeLabel}</div>
        </div>
        <span class="lli-status">${lessonDone ? '⭐' : lessonUnlocked ? '▶' : ''}</span>
      </div>`;
    }).join('') : '';

    return `
      <div class="learn-unit">
        <div class="learn-unit-header ${statusClass}" onclick="${unlocked ? `toggleLearnUnit('${unit.id}')` : ''}">
          <div class="learn-unit-icon" style="background:${unit.color}22">${unit.icon}</div>
          <div class="learn-unit-info">
            <div class="learn-unit-title">${unit.title}</div>
            <div class="learn-unit-sub">${doneCnt}/${unit.lessons.length} leçons · ${done ? '✅ Terminé' : unlocked ? '🔓 Disponible' : '🔒 Verrouillé'}</div>
          </div>
          <span class="learn-unit-badge" style="background:${levelColor}22;color:${levelColor}">${unit.level}</span>
        </div>
        ${isOpen ? `<div class="learn-lessons-list">${lessonsHTML}</div>` : ''}
      </div>
      ${ui < units.length-1 ? `<div class="learn-connector ${done?'done':''}"></div>` : ''}`;
  }).join('');

  const learnContainer = document.getElementById('apprendre-body') || document.getElementById('screen-content');
  learnContainer.innerHTML = `
    <div style="padding-bottom:20px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:1px;margin-bottom:4px">🎓 Parcours ${lang?.flag||''}</div>
      <div style="color:var(--muted);font-size:.78rem;margin-bottom:14px">${doneLessons}/${totalLessons} leçons terminées</div>

// ── EXERCISE ENGINE ──
let currentExercise = null;
let exQueue = [];
let exIdx = 0;
let exHearts = 3;
let exScore = 0;
let exLessonId = null;

function startLearnLesson(lessonId, unitId) {
  exLessonId = lessonId;
  exScore = 0;
  exHearts = 3;
  exIdx = 0;

  // Find lesson type from units
  let lessonType = 'guided';
  let lessonTitle = lessonId;
  for (const [lid, units] of Object.entries(LEARN_UNITS)) {
    for (const unit of units) {
      const found = unit.lessons.find(l => l.id === lessonId);
      if (found) { lessonType = found.type; lessonTitle = found.title; break; }
    }
  }

  const vocab = VOCAB[state.currentLang] || [];
  const words = vocab.length > 0 ? shuffle([...vocab]).slice(0, 12) : [];

  // Alphabet lessons → special builder
  const ALPHA_LESSON_MAP = {
    ru_cyrillic:'cyrillic',
    fa_alph1:'persian', fa_alph2:'persian',
    ja_hira1:'hiragana', ja_hira2:'hiragana',
    ja_kata1:'katakana', ja_kanji1:'kanji',
    zh_tones:'pinyin', zh_pinyin:'pinyin', zh_chars1:'hanzi', zh_hanzi:'hanzi',
    he_alph1:'hebrew', he_alph2:'hebrew'
  };
  if (ALPHA_LESSON_MAP[lessonId]) {
    exQueue = buildAlphabetExercises(ALPHA_LESSON_MAP[lessonId], lessonTitle);
  } else if (lessonType === 'dialogue') {
    exQueue = buildDialogueExercise(lessonId, lessonTitle);
  } else if (lessonType === 'fill') {
    exQueue = buildFillExercises(words, lessonTitle);
  } else if (lessonType === 'listen') {
    exQueue = buildListenExercises(words, lessonTitle);
  } else {
    exQueue = buildGuidedExercises(words, lessonTitle);
  }

  if (exQueue.length === 0) {
    exQueue = buildGuidedExercises(words.length > 0 ? words : getFallbackWords(state.currentLang), lessonTitle);
  }

  renderExercise();
}

function buildAlphabetExercises(systemKey, title) {
  // systemKey: 'cyrillic','hiragana','katakana','kanji','pinyin','hanzi','persian','arabic','hebrew'
  const sys = ALPHABET_SYSTEMS[systemKey];
  if (!sys || !sys.chars) return [];
  const exercises = [];
  const isRTL = ['arabic','persian','hebrew'].includes(systemKey);

  // Intro
  exercises.push({
    type: 'intro',
    title: title,
    instruction: sys.desc || `Découvrons ${sys.name}`,
    words: []
  });

  // One card per character
  sys.chars.forEach(c => {
    exercises.push({
      type: 'alphabet_card',
      char: c.char,
      name: c.name,
      sound: c.sound,
      example: c.example,
      exampleWord: c.example ? c.example.split(' ')[0] : c.char,
      category: sys.name,
      system: systemKey,
      isRTL
    });
  });

  // Quiz: pick the right name/sound for a char (every 5 chars)
  const quizChars = sys.chars.filter((_,i) => i % 5 === 4);
  quizChars.forEach(c => {
    const wrong = shuffle(sys.chars.filter(x => x.char !== c.char)).slice(0,3);
    exercises.push({
      type: 'mcq_native',
      word: { w: c.char, fr: c.sound, p: c.name, ex:'', exFr:'' },
      choices: shuffle([
        { w: c.char, fr: c.sound },
        ...wrong.map(x => ({ w: x.char, fr: x.sound }))
      ]),
      isRTL
    });
  });

  return exercises;
}

function buildGuidedExercises(words, title) {
  const exercises = [];
  const lang = LANGS.find(l => l.id === state.currentLang);
  const isRTL = lang?.rtl;

  // Step 1: Intro card
  exercises.push({
    type: 'intro',
    title: title,
    instruction: `Prêt à apprendre ${words.length} mots ?`,
    words: words.slice(0, 6)
  });

  // Step 2-7: Word cards (see + hear)
  words.slice(0, 6).forEach(w => {
    exercises.push({ type: 'word_card', word: w, isRTL });
  });

  // Step 8+: MCQ questions
  words.slice(0, 5).forEach(w => {
    const wrong = shuffle(words.filter(x => x.fr !== w.fr)).slice(0, 3);
    exercises.push({ type: 'mcq_native', word: w, choices: shuffle([w, ...wrong]) });
  });

  // Final: translation questions
  words.slice(0, 4).forEach(w => {
    const wrong = shuffle(words.filter(x => x.fr !== w.fr)).slice(0, 3);
    exercises.push({ type: 'mcq_fr', word: w, choices: shuffle([w, ...wrong]) });
  });

  return exercises;
}

function buildFillExercises(words, title) {
  const exercises = [];
  const lang = LANGS.find(l => l.id === state.currentLang);

  exercises.push({ type:'intro', title, instruction:`Complète les phrases avec les bons mots`, words: words.slice(0,4) });

  words.slice(0, 7).forEach(w => {
    if (w.ex && w.ex.includes(w.w)) {
      exercises.push({
        type: 'fill_blank',
        word: w,
        sentence: w.ex,
        translation: w.exFr,
        answer: w.w,
        isRTL: lang?.rtl
      });
    } else {
      // Fallback: show translation, type the word
      exercises.push({ type: 'translate_input', word: w, isRTL: lang?.rtl });
    }
  });
  return exercises;
}

function buildListenExercises(words, title) {
  const exercises = [];
  exercises.push({ type:'intro', title, instruction:`Écoute et identifie le bon mot`, words: words.slice(0,4) });

  words.slice(0, 8).forEach(w => {
    const wrong = shuffle(words.filter(x => x.fr !== w.fr)).slice(0, 3);
    exercises.push({ type: 'listen_choose', word: w, choices: shuffle([w, ...wrong]) });
  });
  return exercises;
}

// Languages that need romanization displayed
const NEEDS_ROMAN_LANGS = new Set(['zh','ja','he','ar_lb','ar_sa','ar_ae','fa','dz','ru','ko']);

// Get romanization for a word's example sentence
// Uses exP if available, else tries to extract (roman) from ex field
function getExRoman(w, langId) {
  if (w.exP && w.exP.trim()) return w.exP.trim();
  if (!NEEDS_ROMAN_LANGS.has(langId)) return '';
  if (!w.ex) return '';
  // Extract content between parentheses: e.g. "слово (slovo) = mot" → "slovo"
  // or "word (roman) extra" → "roman"
  const parens = w.ex.match(/\(([^)]{2,60})\)/g);
  if (parens && parens.length > 0) {
    // Join all parenthetical content as the romanization
    return parens.map(p => p.slice(1,-1)).join(' · ');
  }
  return '';
}

// Get word-level romanization (p field), always shown for script langs
function getWordRoman(w, langId) {
  return (w.p && w.p.trim()) ? w.p.trim() : '';
}

      <div class="ex-instruction">Écoute et choisis</div>
      <div style="text-align:center;margin:20px 0">
        <button class="play-audio-btn" style="font-size:1.1rem;padding:14px 28px" onclick="speakWord('${w.w.replace(/'/g,"\\'")}','${state.currentLang}')">🔊 Écouter</button>
      </div>
      <div class="ex-choices" id="ex-choices">
        ${ex.choices.map((c,i)=>`<button class="ex-choice" id="exc${i}" onclick="checkMCQ('${c.fr.replace(/'/g,"\\'")}','${w.fr.replace(/'/g,"\\'")}',${i},'listen')">${c.fr}</button>`).join('')}
      </div>
      <div id="ex-feedback"></div>
    </div>`;
    setTimeout(() => speakWord(w.w, state.currentLang), 500);

  } else if (ex.type === 'alphabet_card') {
    const isRTL = ['arabic','persian','hebrew'].includes(ex.system);
    body = `<div class="ex-card" style="text-align:center">
      <div style="font-size:.75rem;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px">${ex.category||'Lettre / Caractère'}</div>
      <div style="font-size:5rem;font-weight:900;line-height:1;margin:10px 0;direction:${isRTL?'rtl':'ltr'}">${ex.char}</div>
      <div style="font-size:1.4rem;font-weight:800;color:var(--accent);margin-bottom:4px">${ex.name}</div>
      <div style="font-size:1rem;background:rgba(108,71,255,.08);border-radius:10px;padding:6px 16px;display:inline-block;margin-bottom:14px">
        🔊 <span style="font-style:italic">${ex.sound}</span>
      </div>
      ${ex.example ? (()=>{
        const parts = ex.example.split(' = ');
        const native = parts[0]?.trim()||ex.example;
        const rest = parts.slice(1).join(' = ').trim();
        // rest might be "roman (meaning)" — split on first space+paren
        const romanMatch = rest.match(/^([^(]+?)\s*\((.+?)\)(.*)$/);
        const roman = romanMatch ? romanMatch[1].trim() : rest;
        const meaning = romanMatch ? romanMatch[2].trim() : '';
        return `<div style="background:var(--bg3);border-radius:12px;padding:12px 16px;font-size:.88rem;text-align:left">
          <div style="direction:${isRTL?'rtl':'ltr'};font-size:1.05rem;font-weight:700;margin-bottom:5px">${native}</div>
          ${roman ? `<div style="color:var(--accent);font-style:italic;font-size:.82rem;margin-bottom:2px">🔤 ${roman}</div>` : ''}
          ${meaning ? `<div style="color:var(--muted);font-size:.78rem">= ${meaning}</div>` : ''}
        </div>`;
      })() : ''}
      <div style="margin-top:14px">
        <button class="play-audio-btn" onclick="speakWord('${(ex.exampleWord||ex.char).replace(/'/g,"\\'")}','${state.currentLang}')">🔊 Écouter</button>
      </div>
      <button class="ex-next-btn" style="margin-top:16px" onclick="nextExercise()">Suivant →</button>
    </div>`;

  } else if (ex.type === 'dialogue_read') {
    const dlg = ex.dialogue;
    const bubblesHTML = dlg.exchanges.map((e,i) => `
      <div class="dialogue-bubble ${e.speaker===0?'left':'right'}">
        <div style="font-size:.72rem;font-weight:800;color:var(--muted);margin-bottom:4px">${dlg.chars[e.speaker].avatar} ${dlg.chars[e.speaker].name}</div>

      </div>`).join('');
    body = `<div class="ex-card">
      <div class="ex-instruction">Lis ce dialogue</div>
      <div class="dialogue-chars">
        ${dlg.chars.map(c=>`<div class="dialogue-char"><span class="dialogue-char-avatar">${c.avatar}</span><span class="dialogue-char-name">${c.name}</span></div>`).join('')}
      </div>

      <button class="ex-next-btn" style="margin-top:16px" onclick="nextExercise()">J\'ai compris ! →</button>

  } else if (ex.type === 'dialogue_mcq') {
    body = `<div class="ex-card">
      <div class="ex-instruction">Que signifie cette phrase ?</div>
      <div class="ex-word-big" style="font-size:1.4rem;margin:16px 0">${ex.native}</div>

        ${ex.choices.map((c,i)=>`<button class="ex-choice" id="exc${i}" onclick="checkMCQ('${c.replace(/'/g,"\\'")}','${ex.correct.replace(/'/g,"\\'")}',${i},'dlg')">${c}</button>`).join('')}
      </div>
      <div id="ex-feedback"></div>
    </div>`;
    setTimeout(() => speakWord(ex.native, state.currentLang), 400);
  }

  document.getElementById('screen-content').innerHTML = wrapStart + body + wrapEnd;
}

function checkMCQ(chosen, correct, idx, mode) {
  document.querySelectorAll('.ex-choice').forEach(b => b.disabled = true);
  const isCorrect = chosen === correct;
  document.getElementById('exc'+idx).classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) {
    exHearts--;
    // Highlight correct
    document.querySelectorAll('.ex-choice').forEach((b,i) => {
      const val = mode === 'mcq_w' ? exQueue[exIdx].choices[i]?.w : exQueue[exIdx].choices[i]?.fr || exQueue[exIdx].choices[i];
      if (val === correct) b.classList.add('correct');
    });
  } else {
    exScore++;
    addXP(10);
    // Auto play correct word
    const w = exQueue[exIdx].word;
    if (w) speakWord(w.w, state.currentLang);
  }

  const fb = document.getElementById('ex-feedback');
  if (fb) {
    fb.className = 'ex-feedback ' + (isCorrect ? 'correct' : 'wrong');
    fb.innerHTML = isCorrect ? '✅ Bravo !' : `❌ La bonne réponse : <b>${correct}</b>`;
    fb.innerHTML += `<button class="ex-next-btn" style="margin-top:10px" onclick="nextExercise()">Suivant →</button>`;
  }
}

function checkFill() {
  const input = document.getElementById('fill-input');
  if (!input) return;
  const ex = exQueue[exIdx];
  const answer = ex.answer || ex.word?.w;
  const userVal = input.value.trim();
  const isCorrect = userVal.toLowerCase() === answer.toLowerCase();

  input.disabled = true;
  input.classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) { exHearts--; input.value = answer; }
  else { exScore++; addXP(12); }

  const fb = document.getElementById('ex-feedback');
  if (fb) {
    fb.className = 'ex-feedback ' + (isCorrect ? 'correct' : 'wrong');
    fb.innerHTML = (isCorrect ? '✅ Parfait !' : `❌ Réponse : <b>${answer}</b>`) + `<button class="ex-next-btn" style="margin-top:10px" onclick="nextExercise()">Suivant →</button>`;
  }
  document.getElementById('fill-check-btn')?.remove();
}

function checkTranslate() {
  const input = document.getElementById('fill-input');
  if (!input) return;
  const w = exQueue[exIdx].word;
  const userVal = input.value.trim().toLowerCase();
  const correct = w.w.toLowerCase();
  const isCorrect = userVal === correct || userVal === (w.p||'').toLowerCase();

  input.disabled = true;
  input.classList.add(isCorrect ? 'correct' : 'wrong');
  if (!isCorrect) { exHearts--; }
  else { exScore++; addXP(12); speakWord(w.w, state.currentLang); }

  const fb = document.getElementById('ex-feedback');
  if (fb) {
    fb.className = 'ex-feedback ' + (isCorrect ? 'correct' : 'wrong');
    fb.innerHTML = (isCorrect ? `✅ Parfait ! <b>${w.w}</b>` : `❌ Réponse : <b>${w.w}</b>`) + `<button class="ex-next-btn" style="margin-top:10px" onclick="nextExercise()">Suivant →</button>`;
  }
  document.getElementById('fill-check-btn')?.remove();
}

function nextExercise() {
  exIdx++;
  renderExercise();
}

function finishLearnLesson() {
  if (!state.learnDone) state.learnDone = {};
  state.learnDone[exLessonId] = true;
  addXP(50 + exScore * 5);
  saveState();

  const pct = exQueue.length > 0 ? Math.round(exScore / Math.max(1, exQueue.filter(e=>['mcq_native','mcq_fr','fill_blank','translate_input','listen_choose','dialogue_mcq'].includes(e.type)).length) * 100) : 100;

  document.getElementById('screen-content').innerHTML = `
    <div class="ex-result">
      <div style="font-size:4rem;margin-bottom:12px">${pct>=80?'🏆':pct>=50?'⭐':'📚'}</div>
      <div style="font-family:'Bebas Neue',sans-serif;font-size:2rem;letter-spacing:1px;margin-bottom:8px">Leçon terminée !</div>
      <div style="font-size:2.5rem;font-weight:900;color:var(--accent);margin-bottom:8px">${exScore} pts</div>
      <div style="color:var(--muted);margin-bottom:24px">+${50+exScore*5} XP gagnés</div>
      <div style="display:flex;gap:10px;justify-content:center;flex-wrap:wrap">
        <button class="btn-primary" onclick="startLearnLesson('${exLessonId}','')">🔄 Rejouer</button>
        <button class="btn-primary" style="background:var(--bg3);color:var(--text);border:1px solid var(--border)" onclick="renderApprendre()">← Parcours</button>
      </div>
    </div>`;
}

  return topics.map(topic => {
    const isOpen = grammarOpenCard === topic.id;
    const cached = state.grammarCache && state.grammarCache[state.currentLang + '_' + topic.id];
    const levelColor = levelColors[topic.level] || '#94a3b8';

    return `<div class="grammar-card ${isOpen?'open':''}" id="gc-${topic.id}">
      <div class="grammar-card-header" onclick="toggleGrammarCard('${topic.id}')">
        <div class="grammar-card-icon" style="background:${topic.color}18">${topic.icon}</div>
        <div class="grammar-card-title">${topic.title}</div>

      ${isOpen ? `<div class="grammar-card-body" id="gcb-${topic.id}">

function renderGrammarContent(data, lang) {
  // data is the AI-parsed grammar object
  if (typeof data === 'string') {
    // Raw markdown — display nicely
    return `<div class="grammar-rule"><div class="grammar-rule-text">${
      data.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
         .replace(/\n/g,'<br>')
         .replace(/`([^`]+)`/g,'<code style="background:var(--bg3);padding:1px 5px;border-radius:4px;font-size:.9em">$1</code>')
    }</div></div>`;
  }

  // Structured data
  let html = '';
  if (data.explanation) {
    html += `<div class="grammar-rule">
      <div class="grammar-rule-text">${data.explanation.replace(/\n/g,'<br>')}</div>
    </div>`;
  }
  if (data.rules && data.rules.length) {
    data.rules.forEach(r => {
      html += `<div class="grammar-rule">
        <div class="grammar-rule-title">${r.title||''}</div>
        <div class="grammar-rule-text">${(r.text||'').replace(/\n/g,'<br>')}</div>
        ${r.examples ? r.examples.map(ex => `
          <div class="grammar-example">
            <div class="grammar-native ${lang?.rtl?'rtl':''}">${ex.native||ex}</div>
            ${ex.roman ? `<div class="grammar-roman">${ex.roman}</div>` : ''}
            ${ex.fr ? `<div class="grammar-fr">${ex.fr}</div>` : ''}
          </div>`).join('') : ''}
      </div>`;
    });
  }
  if (data.table) {
    html += `<table class="grammar-table">
      <thead><tr>${data.table.headers.map(h=>`<th>${h}</th>`).join('')}</tr></thead>
      <tbody>${data.table.rows.map(row=>`<tr>${row.map((cell,ci)=>`<td class="${ci===0?'native':''}">${cell}</td>`).join('')}</tr>`).join('')}</tbody>
    </table>`;
  }
  if (data.tip) {
    html += `<div style="background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.3);border-radius:12px;padding:12px 14px;margin-top:8px;font-size:.83rem">
      💡 <strong>Astuce :</strong> ${data.tip}
    </div>`;
  }
  return html || `<div class="grammar-rule"><div class="grammar-rule-text">Contenu chargé.</div></div>`;
}

async function toggleGrammarCard(topicId) {
  if (grammarOpenCard === topicId) {
    grammarOpenCard = null;
    renderGrammar();
    return;
  }
  grammarOpenCard = topicId;
  renderGrammar();

  // Check cache
  const cacheKey = state.currentLang + '_' + topicId;
  if (state.grammarCache && state.grammarCache[cacheKey]) return; // already cached

  // Generate via AI
  await generateGrammarFiche(topicId);
}

async function generateGrammarFiche(topicId) {
  const lang = LANGS.find(l => l.id === state.currentLang);
  const topics = getGrammarTopics(state.currentLang);
  const topic = topics.find(t => t.id === topicId);
  if (!topic) return;

  const needsRoman = lang && lang.romanize;
  const cacheKey = state.currentLang + '_' + topicId;

  const prompt = `Tu es un professeur de langues expert. Crée une fiche de grammaire claire pour un apprenant français qui apprend le ${lang?.name || state.currentLang}.

Sujet : "${topic.title}" (niveau ${topic.level})

Retourne UNIQUEMENT un objet JSON valide (pas de markdown) avec cette structure :
{
  "explanation": "Explication courte et claire en français (2-3 phrases)",
  "rules": [
    {
      "title": "Règle 1",
      "text": "Explication détaillée",
      "examples": [
        {"native": "exemple en ${lang?.name}", ${needsRoman?'"roman": "translittération/romanisation",':''} "fr": "traduction française"}
      ]
    }
  ],
  "table": {"headers": ["col1","col2"], "rows": [["val","val"]]},
  "tip": "Astuce mnémotechnique ou point important"
}
- Inclure 2-4 règles avec 2-3 exemples chacune
- Table optionnelle (utile pour les paradigmes, déclinaisons, conjugaisons simples)
- Exemples concrets et mémorables${needsRoman ? '\n- TOUJOURS inclure la romanisation/translittération dans "roman"' : ''}
- Adapter au niveau ${topic.level}`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 2000,
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await resp.json();
    const text = (data.content || []).map(b => b.text || '').join('');

    // Parse JSON
    let parsed;
    try {
      const start = text.indexOf('{');
      const end = text.lastIndexOf('}') + 1;
      parsed = JSON.parse(text.slice(start, end));
    } catch(e) {
      parsed = text; // fallback: display as text
    }

    // Cache it
    if (!state.grammarCache) state.grammarCache = {};
    state.grammarCache[cacheKey] = parsed;
    // Save to localStorage
    try { localStorage.setItem('lingua_grammar', JSON.stringify(state.grammarCache)); } catch(e) {}

    // Re-render
    const bodyEl = document.getElementById('gcb-' + topicId);
    if (bodyEl) {
      bodyEl.innerHTML = renderGrammarContent(parsed, lang);
    }
  } catch(e) {
    const el = document.getElementById('gl-' + topicId);
    if (el) el.innerHTML = `<div style="color:#ef4444;padding:12px;font-size:.85rem">⚠️ Erreur : ${e.message}<br><button onclick="generateGrammarFiche('${topicId}')" class="btn-primary" style="margin-top:8px;padding:8px 14px;font-size:.8rem">🔄 Réessayer</button></div>`;
  }
}

function renderConjTable(data, lang) {
  const needsRoman = lang && lang.romanize;
  const pronouns = data.pronouns || [];
  const forms = data.forms || [];
  const meaning = data.meaning || '';

  let rows = pronouns.map((p, i) => {
    const form = forms[i] || {};
    return `<tr>
      <td class="conj-pronoun">${p}</td>
      <td class="conj-form">
        <span class="${lang?.rtl?'rtl':''}">${form.native || form}</span>
        ${needsRoman && form.roman ? `<span class="conj-roman">${form.roman}</span>` : ''}
      </td>
      <td style="color:var(--muted);font-size:.78rem">${form.fr || ''}</td>
      <td><button class="conj-audio" onclick="speakWord('${(form.native||form).replace(/'/g,"\\'")}','${state.currentLang}')">🔊</button></td>
    </tr>`;
  }).join('');

  const examplesHTML = data.examples ? `
    <div style="margin-top:14px">
      <div style="font-size:.78rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px">Exemples</div>
      ${data.examples.map(ex => `
        <div class="grammar-example">
          <div class="grammar-native ${lang?.rtl?'rtl':''}">${ex.native}</div>
          ${ex.roman ? `<div class="grammar-roman">${ex.roman}</div>` : ''}
          <div class="grammar-fr">${ex.fr}</div>
        </div>`).join('')}
    </div>` : '';

  const exerciseHTML = renderConjExercise(data, lang);

  return `
    <div class="conj-table-wrap">
      ${meaning ? `<div style="padding:12px 16px;font-size:.82rem;color:var(--muted);border-bottom:1px solid var(--border)">📖 ${meaning}</div>` : ''}
      <table class="conj-table">
        <thead><tr><th>Pronom</th><th>Forme</th><th>Sens</th><th></th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    ${examplesHTML}
    ${exerciseHTML}`;
}

function renderConjExercise(data, lang) {
  if (!data.pronouns || data.pronouns.length === 0) return '';
  // Pick 4 random pronouns to test
  const indices = data.pronouns.map((_, i) => i).sort(() => Math.random() - .5).slice(0, 4);
  const rows = indices.map(i => {
    const p = data.pronouns[i];
    const form = data.forms[i];
    const native = form.native || form;
    return `<div class="conj-ex-row">
      <span class="conj-ex-pronoun">${p}</span>
      <input class="conj-ex-input ${lang?.rtl?'rtl':''}" id="cex-${i}" placeholder="…" data-answer="${native.replace(/"/g,'&quot;')}">
      <span class="conj-ex-hint" id="cex-hint-${i}"></span>
    </div>`;
  }).join('');

  return `<div class="conj-exercise">
    <div class="conj-ex-title">✍️ Exercice — Complète la conjugaison</div>
    ${rows}
    <div style="display:flex;gap:8px;margin-top:12px">
      <button class="btn-primary" style="flex:1;padding:10px" onclick="checkConjExercise()">Vérifier ✓</button>
      <button class="btn-primary" style="background:var(--bg3);color:var(--text);border:1px solid var(--border);padding:10px" onclick="revealConjExercise()">Voir les réponses</button>
    </div>
    <div id="conj-ex-result" style="margin-top:10px"></div>
  </div>`;
}

function checkConjExercise() {
  const inputs = document.querySelectorAll('.conj-ex-input');
  let correct = 0;
  inputs.forEach(inp => {
    const answer = inp.dataset.answer;
    const userVal = inp.value.trim();
    const isOk = userVal.toLowerCase() === answer.toLowerCase();
    inp.classList.remove('correct','wrong');
    inp.classList.add(isOk ? 'correct' : 'wrong');
    const hint = document.getElementById('cex-hint-' + inp.id.replace('cex-',''));
    if (hint) hint.textContent = isOk ? '✅' : '❌ ' + answer;
    if (isOk) correct++;
  });
  const res = document.getElementById('conj-ex-result');
  if (res) {
    const pct = Math.round(correct / inputs.length * 100);
    res.innerHTML = `<div style="font-weight:800;color:${pct===100?'#22c55e':pct>=50?'#f59e0b':'#ef4444'}">${pct===100?'🏆 Parfait !':pct>=50?'👍 Bien !':'📚 Continue !'} ${correct}/${inputs.length}</div>`;
    if (correct > 0) addXP(correct * 8);
  }
}

function revealConjExercise() {
  document.querySelectorAll('.conj-ex-input').forEach(inp => {
    inp.value = inp.dataset.answer;
    inp.classList.add('correct');
    speakWord(inp.dataset.answer, state.currentLang);
  });
}

Retourne UNIQUEMENT un objet JSON valide :

  ]
}
- Adapter les pronoms à la langue (ex: arabe/hébreu ont genre M/F)
- ${needsRoman ? 'TOUJOURS inclure romanisation dans "roman"' : 'Inclure "fr" pour chaque forme'}
- Exemples naturels et utiles`;

  try {
    if (conjLoading) return;
    conjLoading = true;
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'anthropic-version': '2023-06-01',
        'anthropic-dangerous-direct-browser-access': 'true'
      },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1500,
        messages: [{ role: 'user', content: prompt }]
      })

    const data = await resp.json();

    conjLoading = false;
  }

// Load grammar cache from localStorage on startup

let vocabLevelFilter = 'all';
let vocabOpenDeck = null;

function getDeckForWord(word) {
  for (const deck of DECK_DEFS) {
    if (deck.id === 'other') continue;
    if (deck.cats.some(c => word.cat && word.cat.toLowerCase().includes(c.toLowerCase()))) return deck;
  }
  return DECK_DEFS.find(d => d.id === 'other');
}

function getWordStatus(langId, wordIdx) {
  const cs = getCardState(langId, wordIdx);
  if (cs.mastery >= 4) return 'mastered';
  if (cs.mastery >= 1 || cs.reviewCount > 0 || cs.seen) return 'learning';
  return 'new';
}

// Mark a word as "seen" (in progress) when user views/listens to it in Collection
function markWordSeen(langId, wordIdx) {
  const key = langId + '_' + wordIdx;
  if (!state.cards[key]) state.cards[key] = { mastery:0, interval:1, nextReview: Date.now(), reviewCount:0 };
  // Only mark seen if still 'new' — don't downgrade learning/mastered
  if (!state.cards[key].seen && state.cards[key].mastery === 0 && state.cards[key].reviewCount === 0) {
    state.cards[key].seen = true;
    saveState();
  }
}

function renderVocab() {
  const vocab = VOCAB[state.currentLang] || [];
  const lang = LANGS.find(l => l.id === state.currentLang);
  const isLoading = VOCAB_LOADING[state.currentLang];

  const deckData = DECK_DEFS.map(def => {
    const words = vocab.map((w, i) => ({ ...w, _idx: i })).filter(w => getDeckForWord(w).id === def.id);
    const mastered = words.filter(w => getWordStatus(state.currentLang, w._idx) === 'mastered').length;
    const learning = words.filter(w => getWordStatus(state.currentLang, w._idx) === 'learning').length;
    const newCount = words.length - mastered - learning;
    const masteredPct = words.length > 0 ? Math.round(mastered/words.length*100) : 0;
    const learningPct = words.length > 0 ? Math.round(learning/words.length*100) : 0;
    return { ...def, words, mastered, learning, newCount, pct: masteredPct, learningPct };
  }).filter(d => d.words.length > 0);

  const totalWords = vocab.length;
  const totalMastered = vocab.filter((w,i) => getWordStatus(state.currentLang,i)==='mastered').length;
  const totalLearning = vocab.filter((w,i) => getWordStatus(state.currentLang,i)==='learning').length;
  const totalNew = totalWords - totalMastered - totalLearning;

  const levels = ['all','A1','A2','B1','B2','new','learning','mastered'];
  const levelLabels = {all:'Tous',A1:'A1',A2:'A2',B1:'B1',B2:'B2',new:'🆕 Nouveaux',learning:'📖 En cours',mastered:'✅ Maîtrisés'};

  ).join('');

  let filtered = [...deckData];
  if (['A1','A2','B1','B2'].includes(vocabLevelFilter)) {
    filtered = filtered.filter(d => d.level === vocabLevelFilter);
  } else if (vocabLevelFilter === 'new') {
    filtered = deckData.map(d=>({...d,words:d.words.filter(w=>getWordStatus(state.currentLang,w._idx)==='new')})).filter(d=>d.words.length>0);
  } else if (vocabLevelFilter === 'learning') {
    filtered = deckData.map(d=>({...d,words:d.words.filter(w=>getWordStatus(state.currentLang,w._idx)==='learning')})).filter(d=>d.words.length>0);
  } else if (vocabLevelFilter === 'mastered') {
    filtered = deckData.map(d=>({...d,words:d.words.filter(w=>getWordStatus(state.currentLang,w._idx)==='mastered')})).filter(d=>d.words.length>0);
  }

  const loadBtn = isLoading
    ? `<button class="load-more-btn" disabled style="margin-bottom:0">⚡ Génération…</button>`
    : `<button class="load-more-btn" onclick="loadMoreVocab('${state.currentLang}')" style="margin-bottom:0">📥 Charger +150 mots${totalWords>0?` (${totalWords} actuels)`:''}</button>`;

  document.getElementById('screen-content').innerHTML = `
    <div class="mosa-header">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
        <div>
          <div style="font-family:'Bebas Neue',sans-serif;font-size:1.7rem;letter-spacing:1px">📚 Ma Collection ${lang?.flag||''}</div>
          <div style="font-size:.75rem;color:var(--muted)">${lang?.name} — ${totalWords} mots chargés</div>
        </div>
      </div>
      <div class="mosa-stats-row">
        <div class="mosa-stat"><div class="mosa-stat-val" style="color:#22c55e">${totalMastered}</div><div class="mosa-stat-lbl">✅ Maîtrisés</div></div>
        <div class="mosa-stat"><div class="mosa-stat-val" style="color:#f59e0b">${totalLearning}</div><div class="mosa-stat-lbl">📖 En cours</div></div>
        <div class="mosa-stat"><div class="mosa-stat-val" style="color:var(--muted)">${totalNew}</div><div class="mosa-stat-lbl">🆕 Nouveaux</div></div>
      </div>
      ${loadBtn}
    </div>
    <div class="mosa-level-tabs" style="margin-top:14px">${levelTabsHTML}</div>
    <div style="display:flex;gap:8px;margin:10px 0;align-items:center">
      <div style="flex:1;position:relative">
        <span style="position:absolute;left:10px;top:50%;transform:translateY(-50%);opacity:.5">🔍</span>
        <input id="vocab-search" type="text" placeholder="Chercher un mot…" oninput="filterVocabSearch(this.value)"
          style="width:100%;padding:8px 12px 8px 34px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-family:'Nunito',sans-serif;font-size:.82rem;box-sizing:border-box">
      </div>
      <select id="freq-filter" onchange="filterVocabSearch(document.getElementById('vocab-search').value)"
        style="padding:8px 10px;border-radius:10px;border:1px solid var(--border);background:var(--bg2);color:var(--text);font-family:'Nunito',sans-serif;font-size:.8rem;cursor:pointer">
        <option value="">Fréquence</option>
        <option value="high">★★★ Haute</option>
        <option value="medium">★★ Moyenne</option>
        <option value="low">★ Rare</option>
      </select>
    </div>
    <div id="vocab-search-results" style="display:none"></div>
    <div class="mosa-decks" id="mosa-decks-list">
      ${filtered.length === 0
        ? `<div class="mosa-empty"><div style="font-size:2.5rem">📭</div><div style="margin-top:8px">Aucun mot — charge du vocabulaire !</div></div>`
        : filtered.map(deck => renderDeckCard(deck, lang)).join('')}
    </div>`;
}

function filterVocabSearch(query) {
  const vocab = VOCAB[state.currentLang] || [];
  const lang = LANGS.find(l => l.id === state.currentLang);
  const freqF = (document.getElementById('freq-filter')||{}).value || '';
  const q = (query||'').toLowerCase().trim();
  const resultsEl = document.getElementById('vocab-search-results');
  const decksEl = document.getElementById('mosa-decks-list');
  if (!q && !freqF) {
    if (resultsEl) resultsEl.style.display = 'none';
    if (decksEl) decksEl.style.display = '';
    return;
  }
  let matches = vocab.map((w,i)=>({...w,_idx:i})).filter(w => {
    const matchQ = !q || (w.w&&w.w.toLowerCase().includes(q)) || (w.fr&&w.fr.toLowerCase().includes(q)) || (w.p&&w.p.toLowerCase().includes(q)) || (w.syn&&w.syn.toLowerCase().includes(q));
    const matchF = !freqF || w.freq === freqF;
    return matchQ && matchF;
  });
  if (decksEl) decksEl.style.display = 'none';
  if (!resultsEl) return;
  if (!matches.length) {
    resultsEl.style.display = '';
    resultsEl.innerHTML = '<div style="text-align:center;padding:24px;color:var(--muted)">Aucun résultat pour "' + (q||freqF) + '"</div>';
    return;
  }
  const showRoman = lang && lang.romanize;
  const rows = matches.slice(0,60).map(w => {
    const status = getWordStatus(state.currentLang, w._idx);
    const statusIcon = status==='mastered'?'✅':status==='learning'?'📖':'🆕';
    const freqC = w.freq==='high'?'#16a34a':w.freq==='medium'?'#d97706':'#94a3b8';
    const freqS = w.freq==='high'?'★★★':w.freq==='medium'?'★★':w.freq==='low'?'★':'';
    const synLine = (w.syn&&w.syn.trim()) ? '<div style="font-size:.67rem;color:var(--muted);margin-top:2px">≈ <em style="color:var(--accent)">' + w.syn + '</em>' + (w.synFr?' · '+w.synFr:'') + '</div>' : '';
    const cultLine = (w.cult&&w.cult.trim()) ? '<div style="font-size:.65rem;color:#9333ea;margin-top:2px;padding:2px 5px;background:rgba(147,51,234,.07);border-radius:4px">💡 '+w.cult+'</div>' : '';
    const exPLine = (w.exP&&w.exP.trim()) ? '<div style="font-size:.64rem;color:var(--accent);font-style:italic;margin-top:1px;opacity:.8">'+w.exP+'</div>' : '';
    return '<div class="mosa-word-row ' + status + '" style="flex-wrap:wrap" onclick="markWordSeen(\''+state.currentLang+'\','+w._idx+')">'
      + '<div class="mwr-status s-' + status + '" onclick="markWordSeen(\''+state.currentLang+'\','+w._idx+');speakWord(\''+w.w.replace(/'/g,"\'")+'\',\''+state.currentLang+'\');event.stopPropagation()">' + statusIcon + '</div>'
      + '<div style="flex:1;min-width:0">'
      + '<div class="mwr-word' + (lang&&lang.rtl?' rtl':'') + '">' + w.w + (freqS?'<span style="font-size:.58rem;margin-left:5px;color:'+freqC+'">'+freqS+'</span>':'') + '</div>'
      + (showRoman&&w.p?'<div class="mwr-roman">'+w.p+'</div>':'')
      + synLine
      + exPLine
      + cultLine
      + '</div>'
      + '<div class="mwr-fr">' + w.fr + '</div>'
      + '<button class="play-audio-btn" onclick="speakWord(\''+w.w.replace(/'/g,"\'")+'\',' +JSON.stringify(state.currentLang)+');event.stopPropagation()">🔊</button>'
      + '</div>';
  }).join('');
  resultsEl.style.display = '';
  resultsEl.innerHTML = '<div style="font-size:.72rem;color:var(--muted);margin-bottom:8px">' + matches.length + ' résultat' + (matches.length>1?'s':'') + (matches.length>60?' (60 affichés)':'') + '</div>' + rows;
}

function renderDeckCard(deck, lang) {
  const isOpen = vocabOpenDeck === deck.id;
  const levelColor = LEVEL_COLORS[deck.level] || '#94a3b8';
  const masteredPct = deck.pct || 0;
  const learningPct = deck.learningPct || 0;

  let wordsHTML = '';
  if (isOpen) {
    const display = deck.words.slice(0, 60);
    const rest = deck.words.length - 60;
    wordsHTML = display.map(w => {
      const status = getWordStatus(state.currentLang, w._idx);
      const statusIcon = status==='mastered'?'✅':status==='learning'?'📖':'🆕';
      const showRoman = lang && lang.romanize && w.p;
      const varHTML = (state.currentLang==='dz'&&(w.ma||w.dz2||w.tn))
        ? `<div class="mwr-variants">${w.ma?'🇲🇦 '+w.ma+' ':''} ${w.dz2?'🇩🇿 '+w.dz2+' ':''} ${w.tn?'🇹🇳 '+w.tn:''}</div>`:'';
      const cs = getCardState(state.currentLang, w._idx);
      const mastery = cs.mastery || 0;
      const pips = [0,1,2,3,4,5].map(n =>
        `<span style="width:5px;height:5px;border-radius:50%;background:${n<mastery?(mastery>=4?'#22c55e':mastery>=2?'#f59e0b':'#6c47ff'):'var(--border)'};display:inline-block;margin:0 1px"></span>`
      ).join('');
      const freqC = w.freq==='high'?'#16a34a':w.freq==='medium'?'#d97706':'#94a3b8';
      const freqBg = w.freq==='high'?'rgba(34,197,94,.13)':w.freq==='medium'?'rgba(245,158,11,.13)':'rgba(148,163,184,.1)';
      const freqStar = w.freq==='high'?'★★★':w.freq==='medium'?'★★':w.freq==='low'?'★':'';
      const freqBadge = freqStar ? '<span style="font-size:.58rem;padding:1px 5px;border-radius:8px;font-weight:800;background:'+freqBg+';color:'+freqC+'">'+freqStar+'</span>' : '';
      const synRow = (w.syn && w.syn.trim()) ? '<div style="font-size:.67rem;color:var(--muted);margin-top:3px;padding-top:3px;border-top:1px dashed var(--border)">≈ <em style="color:var(--accent)">' + w.syn + '</em>' + (w.synFr ? ' <span style="opacity:.55">· ' + w.synFr + '</span>' : '') + '</div>' : '';
      const cultRow = (w.cult && w.cult.trim()) ? '<div style="font-size:.65rem;color:#9333ea;margin-top:3px;padding:2px 6px;background:rgba(147,51,234,.07);border-radius:5px">💡 ' + w.cult + '</div>' : '';
      const exPRow = (w.exP && w.exP.trim()) ? '<div style="font-size:.65rem;color:var(--accent);font-style:italic;margin-top:2px;opacity:.8">' + w.exP + '</div>' : '';
      return `<div class="mosa-word-row ${status}" style="flex-wrap:wrap" onclick="markWordSeen('${state.currentLang}',${w._idx})">
        <div class="mwr-status s-${status}" onclick="markWordSeen('${state.currentLang}',${w._idx});speakWord('${w.w.replace(/'/g,"\\'")}','${state.currentLang}');event.stopPropagation()">${statusIcon}</div>
        <div style="flex:1;min-width:0">
          <div class="mwr-word ${lang?.rtl?'rtl':''}">${w.w} ${freqBadge}</div>
          ${showRoman?`<div class="mwr-roman">${w.p}</div>`:''}
          <div style="margin-top:3px">${pips}</div>
          ${synRow}
          ${exPRow}
          ${cultRow}
        </div>
        <div class="mwr-fr">${w.fr}</div>
        <button class="play-audio-btn" onclick="markWordSeen('${state.currentLang}',${w._idx});speakWord('${w.w.replace(/'/g,"\\'")}','${state.currentLang}');event.stopPropagation()">🔊</button>
        ${varHTML}
      </div>`;
    }).join('');
    if (rest > 0) wordsHTML += `<div style="text-align:center;padding:8px;color:var(--muted);font-size:.8rem">+${rest} mots supplémentaires</div>`;
    wordsHTML += `<button class="btn-primary" style="width:100%;margin-top:8px;padding:10px;font-size:.85rem" onclick="startDeckSRS('${deck.id}');event.stopPropagation()">🃏 Réviser ce paquet</button>`;
  }

  return `<div class="mosa-deck ${isOpen?'open':''}" id="deck-${deck.id}" onclick="toggleDeck('${deck.id}')">
    <div class="mosa-deck-header">
      <div class="mosa-deck-icon" style="background:${deck.color}22">${deck.emoji}</div>
      <div class="mosa-deck-info">
        <div class="mosa-deck-title">${deck.title}</div>
        <div class="mosa-deck-sub">${deck.words.length} mots · ${deck.mastered} ✅ · ${deck.learning} 📖 · ${deck.newCount||0} 🆕</div>
        <div class="mosa-deck-bar-wrap" style="position:relative">
          <div style="position:absolute;left:0;top:0;height:100%;border-radius:4px;background:#22c55e;width:${masteredPct}%;transition:width .4s"></div>
          <div style="position:absolute;left:${masteredPct}%;top:0;height:100%;border-radius:4px;background:#f59e0b;width:${learningPct}%;transition:width .4s"></div>
        </div>
      </div>
      <div class="mosa-deck-right">
        <span class="mosa-deck-badge" style="background:${levelColor}22;color:${levelColor}">${deck.level}</span>
        <span style="font-size:.75rem;font-weight:800;color:${masteredPct===100?'#22c55e':'var(--muted)'}">${masteredPct}%</span>
        <span class="mosa-deck-chevron">▾</span>
      </div>
    </div>
    ${isOpen ? `<div class="mosa-deck-words">${wordsHTML}</div>` : ''}
  </div>`;
}

function toggleDeck(deckId) {
  vocabOpenDeck = vocabOpenDeck === deckId ? null : deckId;
  renderVocab();
}

function setVocabLevel(level) {
  vocabLevelFilter = level;
  vocabOpenDeck = null;
  renderVocab();
}

function startDeckSRS(deckId) {
  state._srsFilter = deckId;
  showScreen('srs');
}

async function sendAI() {
  const input = document.getElementById('ai-input');
  const msg = input.value.trim();
  if (!msg) return;
  input.value = '';
  
  const lang = LANGS.find(l=>l.id===state.currentLang);
  const messages = document.getElementById('ai-messages');
  
  // Add user message
  messages.innerHTML += `<div class="msg msg-user">${msg}</div>`;
  
  // Add thinking indicator
  const thinkId = 'think-' + Date.now();
  messages.innerHTML += `<div class="msg msg-ai" id="${thinkId}"><div class="ai-thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div></div>`;
  messages.scrollTop = messages.scrollHeight;
  
  const langName = lang ? `${lang.flag} ${lang.name}` : 'la langue sélectionnée';
  const userLevel = getLevelName();
  
  const systemPrompt = `Tu es Lingua, un tuteur de langues expert, enthousiaste et pédagogue. L\'utilisateur apprend ${langName} et est de niveau ${userLevel}.

Tes réponses sont :
- Courtes, claires et mémorables (pas de longues listes ennuyeuses)
- Structurées avec des exemples natifs + traduction
- Avec phonétique quand c.est utile
- Fun, avec des émojis et de l\'enthousiasme
- Adaptées au niveau de l\'utilisateur

Pour les listes de vocabulaire : format "mot natif (phonétique) = traduction — exemple court"
Pour les exercices : crée des questions interactives
Pour la grammaire : une règle + 2 exemples max, puis propose un exercice`;

  state.aiHistory.push({role:'user', content: msg});
  
  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system: systemPrompt,
        messages: state.aiHistory.slice(-10)
      })
    });
    
    const data = await resp.json();
    const reply = data.content?.[0]?.text || 'Désolé, je n\'ai pas pu répondre. Réessaie !';
    
    state.aiHistory.push({role:'assistant', content: reply});
    
    document.getElementById(thinkId).innerHTML = reply.replace(/\n/g,'<br>');
    addXP(5);
  } catch(e) {
    document.getElementById(thinkId).innerHTML = '⚠️ Erreur de connexion. Vérifie ta connexion internet et réessaie !';
  }
  
  messages.scrollTop = messages.scrollHeight;
  saveState();
}

// ── Collect ALL data from localStorage into one object ──
function collectAllData() {
  const data = {
    _version: 2,
    _date: new Date().toISOString(),
    _app: 'Lingua',
    state: JSON.parse(localStorage.getItem('lingua_state') || '{}'),
    grammar: JSON.parse(localStorage.getItem('lingua_grammar') || '{}'),
    vocab: {}
  };
  // Collect vocab for all known languages
  const allLangIds = ['en','es','it','pt','de','nl','ru','pl','cs','tr','zh','ja','ar_lb','ar_sa','ar_ae','he','fa','dz'];
  allLangIds.forEach(id => {
    const raw = localStorage.getItem('lingua_vocab_' + id);
    if (raw) {
      try { data.vocab[id] = JSON.parse(raw); } catch(e) {}
    }
  });
  // Also scan for any other lingua_ keys
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith('lingua_vocab_') && !data.vocab[key.replace('lingua_vocab_','')]) {
      try { data.vocab[key.replace('lingua_vocab_','')] = JSON.parse(localStorage.getItem(key)); } catch(e) {}
    }
  }
  return data;
}

// ── Export: download a .json file ──
function exportData() {
  const data = collectAllData();
  const json = JSON.stringify(data, null, 2);
  const blob = new Blob([json], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url;
  a.download = 'lingua_backup_' + date + '.json';
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
  URL.revokeObjectURL(url);
  showBackupStatus('✅ Fichier téléchargé : lingua_backup_' + date + '.json', 'success');
}

// ── Import: restore from a .json file ──
function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (!data._app || data._app !== 'Lingua') {
        showBackupStatus('❌ Fichier invalide — ce n\'est pas une sauvegarde Lingua', 'error');
        return;
      }
      if (!confirm('Restaurer cette sauvegarde du ' + (data._date ? data._date.slice(0,10) : '?') + ' ?\nCela remplacera toutes tes données actuelles.')) return;

      // Restore state
      if (data.state) localStorage.setItem('lingua_state', JSON.stringify(data.state));
      // Restore grammar
      if (data.grammar) localStorage.setItem('lingua_grammar', JSON.stringify(data.grammar));
      // Restore vocab
      if (data.vocab) {
        Object.entries(data.vocab).forEach(([id, words]) => {
          localStorage.setItem('lingua_vocab_' + id, JSON.stringify(words));
        });
      }
      showBackupStatus('✅ Sauvegarde restaurée ! Rechargement...', 'success');
      setTimeout(() => location.reload(), 1500);
    } catch(err) {
      showBackupStatus('❌ Erreur lors de la lecture du fichier : ' + err.message, 'error');
    }
  };
  reader.readAsText(file);
}

// ── Show backup status message ──
function showBackupStatus(msg, type) {
  const el = document.getElementById('backup-status-msg');
  if (el) {
    el.textContent = msg;
    el.style.color = type === 'success' ? '#16a34a' : type === 'error' ? '#ef4444' : 'var(--muted)';
  }
}

// ── Auto-save indicator update ──
function updateAutoSaveIndicator() {
  const el = document.getElementById('autosave-time');
  if (el) el.textContent = 'Sauvegardé ' + new Date().toLocaleTimeString('fr-FR', {hour:'2-digit',minute:'2-digit'});
}

// ── Get data size info ──
function getDataSizeInfo() {
  let totalBytes = 0;
  let vocabCount = 0;
  const langIds = ['en','es','it','pt','de','nl','ru','pl','cs','tr','zh','ja','ar_lb','ar_sa','ar_ae','he','fa','dz'];
  langIds.forEach(id => {
    const raw = localStorage.getItem('lingua_vocab_' + id);
    if (raw) { totalBytes += raw.length; vocabCount += JSON.parse(raw).length; }
  });
  const stateRaw = localStorage.getItem('lingua_state') || '';
  totalBytes += stateRaw.length;
  const grammarRaw = localStorage.getItem('lingua_grammar') || '';
  totalBytes += grammarRaw.length;
  const kb = (totalBytes / 1024).toFixed(1);
  return { kb, vocabCount };
}


// ══════════════════════════════════════════════════════════════
// STATS — Heatmap, courbe maîtrise, mots difficiles
// ══════════════════════════════════════════════════════════════
function renderStats() {
  const sc = document.getElementById('screen-content');

  // ── Heatmap data: last 365 days ──
  const today = new Date();
  const cells = [];
  for (let i = 364; i >= 0; i--) {
    const d = new Date(today);
    d.setDate(d.getDate() - i);
    const iso = d.toISOString().split('T')[0];
    const act = (state.activityLog || {})[iso] || {reviews:0};
    cells.push({iso, reviews: act.reviews || 0, dow: d.getDay()});
  }

  // Build heatmap rows (7 rows = days of week)
  const weeks = [];
  let week = [];
  // Pad start
  const firstDow = cells[0].dow;
  for (let i = 0; i < firstDow; i++) week.push(null);
  for (const c of cells) {
    week.push(c);
    if (week.length === 7) { weeks.push(week); week = []; }
  }
  if (week.length) { while(week.length<7) week.push(null); weeks.push(week); }

  const dayLabels = ['D','L','M','M','J','V','S'];
  const heatmapHTML = '<div style="overflow-x:auto"><div style="display:inline-flex;gap:2px">'
    + '<div style="display:flex;flex-direction:column;gap:2px;margin-right:4px">'
    + dayLabels.map(d=>'<div style="width:10px;height:11px;font-size:.52rem;color:var(--muted);line-height:11px">'+d+'</div>').join('')
    + '</div>'
    + weeks.map(w=>'<div style="display:flex;flex-direction:column;gap:2px">'
        + w.map(c=>{
            if(!c) return '<div style="width:11px;height:11px;border-radius:2px;background:transparent"></div>';
            const lvl = c.reviews===0?0:c.reviews<=2?1:c.reviews<=5?2:c.reviews<=10?3:4;
            const colors = ['var(--bg3)','#c4b5fd','#8b5cf6','#6c47ff','#4c1d95'];
            const col = colors[lvl];
            return '<div title="'+c.iso+': '+c.reviews+' révisions" style="width:11px;height:11px;border-radius:2px;background:'+col+';cursor:default"></div>';
          }).join('')
        + '</div>').join('')
    + '</div></div>';

  // ── Mastery curve ──
  const hist = (state.masteryHistory || []).filter(h=>h.lang===state.currentLang);
  let curveHTML = '';
  if (hist.length >= 2) {
    const maxM = Math.max(...hist.map(h=>h.mastered), 1);
    const W = 280, H = 80;
    const pts = hist.slice(-30).map((h,i,arr)=>{
      const x = (i/(arr.length-1))*W;
      const y = H - (h.mastered/maxM)*H;
      return x+','+y;
    }).join(' ');
    curveHTML = '<div style="margin-top:16px">'
      + '<div style="font-size:.75rem;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:6px">📈 Progression des mots maîtrisés</div>'
      + '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:'+H+'px;border-radius:8px;background:var(--bg2)">'
      + '<polyline points="'+pts+'" fill="none" stroke="var(--accent)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>'
      + '<text x="4" y="12" font-size="9" fill="var(--muted)">'+maxM+'</text>'
      + '<text x="4" y="'+(H-2)+'" font-size="9" fill="var(--muted)">0</text>'
      + '</svg>'

// BACKUP FUNCTIONS
// ═══════════════════════════════════════
function collectAllData() {
  const data = { _version:2, _date:new Date().toISOString(), _app:'Lingua',
    state: JSON.parse(localStorage.getItem('lingua_state')||'{}'),
    grammar: JSON.parse(localStorage.getItem('lingua_grammar')||'{}'),
    vocab: {}
  };
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (key && key.startsWith('lingua_vocab_')) {
      try { data.vocab[key.replace('lingua_vocab_','')] = JSON.parse(localStorage.getItem(key)); } catch(e){}
    }
  }
  return data;
}

function exportData() {
  const data = collectAllData();
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  const date = new Date().toISOString().slice(0,10);
  a.href = url; a.download = 'lingua_backup_' + date + '.json';
  document.body.appendChild(a); a.click();
  document.body.removeChild(a); URL.revokeObjectURL(url);
  localStorage.setItem('lingua_last_export', new Date().toLocaleDateString('fr-FR'));
  showBackupStatus('✅ Fichier téléchargé : lingua_backup_' + date + '.json', 'success');
}

function importData(event) {
  const file = event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = function(e) {
    try {
      const data = JSON.parse(e.target.result);
      if (data._app !== 'Lingua') { showBackupStatus('❌ Fichier invalide — pas une sauvegarde Lingua', 'error'); return; }
      if (!confirm('Restaurer la sauvegarde du ' + (data._date||'?').slice(0,10) + ' ?\nCela remplace toutes tes données actuelles.')) return;
      if (data.state) localStorage.setItem('lingua_state', JSON.stringify(data.state));
      if (data.grammar) localStorage.setItem('lingua_grammar', JSON.stringify(data.grammar));
      if (data.vocab) Object.entries(data.vocab).forEach(([id,w]) => localStorage.setItem('lingua_vocab_'+id, JSON.stringify(w)));
      showBackupStatus('✅ Restauré ! Rechargement...', 'success');
      setTimeout(() => location.reload(), 1500);
    } catch(err) { showBackupStatus('❌ Erreur : ' + err.message, 'error'); }
  };
  reader.readAsText(file);
}

function copyDataToClipboard() {
  navigator.clipboard.writeText(JSON.stringify(collectAllData()))
    .then(() => showBackupStatus('✅ Données copiées ! Colle dans un fichier .txt pour garder.', 'success'))
    .catch(() => showBackupStatus('❌ Accès presse-papier refusé. Utilise le téléchargement .json.', 'error'));
}

function pasteDataFromClipboard() {
  navigator.clipboard.readText().then(text => {
    try {
      const data = JSON.parse(text);
      if (data._app !== 'Lingua') throw new Error('Pas une sauvegarde Lingua');
      if (!confirm('Restaurer depuis presse-papier ?')) return;
      if (data.state) localStorage.setItem('lingua_state', JSON.stringify(data.state));
      if (data.grammar) localStorage.setItem('lingua_grammar', JSON.stringify(data.grammar));
      if (data.vocab) Object.entries(data.vocab).forEach(([id,w]) => localStorage.setItem('lingua_vocab_'+id, JSON.stringify(w)));
      showBackupStatus('✅ Restauré ! Rechargement...', 'success');
      setTimeout(() => location.reload(), 1500);
    } catch(err) { showBackupStatus('❌ Contenu invalide : ' + err.message, 'error'); }
  }).catch(() => showBackupStatus('❌ Impossible de lire le presse-papier.', 'error'));
}

function showBackupStatus(msg, type) {
  const el = document.getElementById('backup-status-msg');
  if (el) { el.textContent = msg; el.style.color = type==='success'?'#16a34a':type==='error'?'#ef4444':'var(--muted)'; }
}

function getDataSizeInfo() {
  let totalBytes = 0, vocabCount = 0;
  for (let i = 0; i < localStorage.length; i++) {
    const key = localStorage.key(i);
    if (!key || !key.startsWith('lingua_')) continue;
    const raw = localStorage.getItem(key) || '';
    totalBytes += raw.length;
    if (key.startsWith('lingua_vocab_')) { try { vocabCount += JSON.parse(raw).length; } catch(e){} }
  }
  return { kb: (totalBytes/1024).toFixed(1), vocabCount };
}

function renderAlphabet() {
  // Auto-set alphabetMode to the first tab of current lang if mismatched
  const langTabs = LANG_ALPHA_TABS[state.currentLang] || [LANG_ALPHABET_MAP[state.currentLang] || 'hebrew'];
  if (!langTabs.includes(alphabetMode)) alphabetMode = langTabs[0];

  const sys = ALPHABET_SYSTEMS[alphabetMode];
  const tabs = langTabs.map(k => {
    const v = ALPHABET_SYSTEMS[k];
    return `<button class="alpha-tab ${alphabetMode===k?'active':''}" onclick="switchAlphabetMode('${k}')">${v.flag} ${v.name}</button>`;
  }).join('');

  const cards = sys.chars.map((c, i) =>
    `<div class="alpha-card ${alphabetFlip[i]?'flipped':''}" onclick="flipAlphaCard(${i})">
      <div class="alpha-card-inner">
        <div class="alpha-front">
          <div class="alpha-char">${c.char}</div>
          <div class="alpha-name">${c.name}</div>
        </div>
        <div class="alpha-back">
          <div class="alpha-sound">🔊 ${c.sound}</div>
          <div class="alpha-example">${c.example}</div>
        </div>
      </div>
    </div>`
  ).join('');

  document.getElementById('screen-content').innerHTML = `
    <div style="padding-bottom:80px">
      <div style="font-family:'Bebas Neue',sans-serif;font-size:1.8rem;letter-spacing:1px;margin-bottom:4px">🔤 Alphabets</div>
      <div style="color:var(--muted);font-size:.85rem;margin-bottom:16px">Clique sur une lettre pour voir sa prononciation</div>

      <div class="alpha-tabs">${tabs}</div>

      <div class="alpha-desc">${sys.flag} <b>${sys.name}</b> — ${sys.desc}</div>

      <div style="display:flex;gap:8px;margin-bottom:16px;flex-wrap:wrap">
        <button class="load-more-btn" style="flex:1;min-width:120px;padding:10px;font-size:.85rem" onclick="flipAllAlphaCards(true)">👁 Tout révéler</button>
        <button class="load-more-btn" style="flex:1;min-width:120px;padding:10px;font-size:.85rem" onclick="flipAllAlphaCards(false)">🔒 Tout cacher</button>
        <button class="load-more-btn" style="flex:1;min-width:120px;padding:10px;font-size:.85rem;border-style:solid" onclick="startAlphaQuiz()">🧠 Quiz alphabet</button>
      </div>

      <div class="alpha-grid">${cards}</div>

      <div id="alpha-quiz-zone"></div>
    </div>`;
}

function switchAlphabetMode(mode) {
  alphabetMode = mode;
  alphabetFlip = {};
  renderAlphabet();
}

function flipAlphaCard(i) {
  alphabetFlip[i] = !alphabetFlip[i];
  const cards = document.querySelectorAll('.alpha-card');
  if (cards[i]) cards[i].classList.toggle('flipped', alphabetFlip[i]);
}

function flipAllAlphaCards(reveal) {
  const sys = ALPHABET_SYSTEMS[alphabetMode];
  sys.chars.forEach((_, i) => alphabetFlip[i] = reveal);
  renderAlphabet();
}

function startAlphaQuiz() {
  const sys = ALPHABET_SYSTEMS[alphabetMode];
  const chars = [...sys.chars].sort(() => Math.random() - 0.5).slice(0, 10);
  alphabetQuizState = { chars, current: 0, score: 0 };
  renderAlphaQuizQ();
}

function renderAlphaQuizQ() {
  const qs = alphabetQuizState;
  if (!qs || qs.current >= qs.chars.length) {
    document.getElementById('alpha-quiz-zone').innerHTML = `
      <div style="text-align:center;padding:24px;background:var(--bg2);border-radius:16px;margin-top:16px">
        <div style="font-size:2.5rem">🏆</div>
        <div style="font-size:1.3rem;font-weight:800;margin:8px 0">Quiz terminé !</div>
        <div style="color:var(--muted)">Score : ${qs.score} / ${qs.chars.length}</div>
        <button class="btn-primary" style="margin-top:16px;width:100%" onclick="startAlphaQuiz()">🔄 Rejouer</button>
      </div>`;
    return;
  }

  const q = qs.chars[qs.current];
  const sys = ALPHABET_SYSTEMS[alphabetMode];
  // Pick 3 random wrong answers
  const others = sys.chars.filter(c => c.char !== q.char).sort(() => Math.random() - 0.5).slice(0, 3);
  const options = [...others, q].sort(() => Math.random() - 0.5);
  const correctIdx = options.indexOf(q);

  const opts = options.map((o, i) =>
    `<button class="quiz-opt" onclick="checkAlphaAnswer(${i},${correctIdx},this)" style="font-size:.9rem">${o.sound}</button>`
  ).join('');

  document.getElementById('alpha-quiz-zone').innerHTML = `
    <div style="background:var(--bg2);border-radius:16px;padding:20px;margin-top:16px">
      <div style="font-size:.85rem;color:var(--muted);margin-bottom:8px">Question ${qs.current+1}/${qs.chars.length} · Score: ${qs.score}</div>
      <div style="text-align:center;font-size:4rem;margin:16px 0;direction:${['hebrew','arabic','persian'].includes(alphabetMode)?'rtl':'ltr'}">${q.char}</div>
      <div style="font-size:.9rem;color:var(--muted);text-align:center;margin-bottom:16px">Quel est le son de cette lettre ?</div>
      <div class="quiz-options">${opts}</div>
      <div id="alpha-quiz-feedback" style="min-height:40px;margin-top:12px"></div>
    </div>`;
}

function checkAlphaAnswer(chosen, correct, btn) {
  const btns = document.querySelectorAll('#alpha-quiz-zone .quiz-opt');
  btns.forEach((b,i) => {
    b.disabled = true;
    if (i === correct) b.style.background = '#22c55e';
    else if (i === chosen) b.style.background = '#ef4444';
  });
  const fb = document.getElementById('alpha-quiz-feedback');
  if (chosen === correct) {
    alphabetQuizState.score++;
    fb.innerHTML = `<div style="color:#22c55e;font-weight:700">✅ Correct !</div>`;
  } else {
    fb.innerHTML = `<div style="color:#ef4444;font-weight:700">❌ Raté</div>`;
  }
  alphabetQuizState.current++;
  fb.innerHTML += `<button class="btn-primary" style="margin-top:8px;width:100%;padding:10px" onclick="renderAlphaQuizQ()">Suivant →</button>`;
}

// ── Sauvegarde vers Firestore ─────────────────────────────
function fbSaveToCloud() {
  if (!fbInitialized || !fbUser) return;
  // Debounce: attend 2s après le dernier changement avant de sauvegarder
  clearTimeout(fbSyncTimeout);
  fbSyncTimeout = setTimeout(async () => {
    try {
      const data = collectAllData();
      const uid = fbUser.uid;
      const ref = fbDb.collection('users').doc(uid);
      // Découpe vocab par langue (Firestore limite 1MB/document)
      const batch = fbDb.batch();
      // Document principal: state + grammar
      batch.set(ref, {
        _version: data._version,
        _date: data._date,
        state: JSON.stringify(data.state),
        grammar: JSON.stringify(data.grammar),
        email: fbUser.email,
        updatedAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      // Sous-collection vocab: un document par langue
      Object.entries(data.vocab).forEach(([langId, words]) => {
        const vocabRef = ref.collection('vocab').doc(langId);
        batch.set(vocabRef, { words: JSON.stringify(words) });
      });
      await batch.commit();
      // Indicateur visuel
      const dot = document.getElementById('fb-sync-dot');
      if (dot) { dot.style.background = '#22c55e'; setTimeout(() => { dot.style.background = ''; }, 2000); }
    } catch(e) {
    }
  }, 2000);
}

// ── Chargement depuis Firestore ───────────────────────────
async function fbLoadFromCloud() {
  if (!fbInitialized || !fbUser) return;
  try {
    const uid = fbUser.uid;
    const ref = fbDb.collection('users').doc(uid);
    const doc = await ref.get();
    if (!doc.exists) {
      // Première connexion — upload les données locales
      fbSaveToCloud();
      return;
    }
    const cloudData = doc.data();
    const cloudDate = cloudData.updatedAt ? cloudData.updatedAt.toDate() : new Date(0);
    const localState = JSON.parse(localStorage.getItem('lingua_state') || '{}');
    const localDate = localState.lastSaved ? new Date(localState.lastSaved) : new Date(0);

    if (cloudDate > localDate) {
      // Cloud plus récent — demande à l'utilisateur
      const ok = confirm(
        `Une sauvegarde plus récente est disponible dans le cloud (${cloudDate.toLocaleDateString('fr-FR')}).

Voulez-vous charger la progression du cloud ?
(Oui = remplace les données locales)`
      );
      if (ok) {
        // Restore state
        if (cloudData.state) localStorage.setItem('lingua_state', cloudData.state);
        if (cloudData.grammar) localStorage.setItem('lingua_grammar', cloudData.grammar);
        // Restore vocab
        const vocabSnap = await ref.collection('vocab').get();
        vocabSnap.forEach(vDoc => {
          try {
            localStorage.setItem('lingua_vocab_' + vDoc.id, vDoc.data().words);
          } catch(e) {}
        });
        showBackupStatus('✅ Données cloud chargées ! Rechargement...', 'success');
        setTimeout(() => location.reload(), 1500);
      }
    } else {
      // Local plus récent ou égal — upload vers cloud
      fbSaveToCloud();
    }
  } catch(e) {
  }
}
